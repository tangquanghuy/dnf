        apostleProjection: '使徒投影',
        clearSignificance: '通关意义',
        special: '特殊',
        settlement: '聚落',
        settlementFunction: '聚落功能',
        ecologicalChain: '生态链',
        civilizationImpact: '文明影响',
        relationWithSixteenRaces: '与十六种族关系',
        fullName: '完整名称',
        region: '地理区域',
        bloodIndex: '龙血指数',
        people: '人群',
        dailyLife: '日常',
        peopleDaily: '人群生态与日常生活',
        shadow: '里世界',
        shadowPattern: '里侧格局',
        factions: '相关势力',
        dragonTrace: '龙类痕迹',
        resources: '资源',
        access: '交通与进入',
        resourcesAccess: '资源与入口',
        threats: '威胁与麻烦',
        scenes: '子场景',
        canon: '原著锚点',
        hooks: '剧情钩子',
        legends: '传说与流言',
        parentName: '所属地点',
      };

      const PHYSICAL_LABELS = {
        terrain: '地形',
        lighting: '光照',
        gravity: '重力',
        temperaturePressure: '温度与气压',
        hydrology: '水文',
      };

      // Fields to skip in detail modal
      const SKIP_FIELDS = new Set([
        'id', 'name', 'type', 'x', 'y', 'discovered', 'secrets', 'detailMap',
        'brief', 'summary', 'physicalConsequences', 'encounters', 'loot',
        'lon', 'lat', 'independent', 'geoNote', 'displayName', 'parentId'
      ]);
      const NODE_FIELD_PRIORITY = ['id', 'name', 'type', 'x', 'y', 'region', 'tier', 'dangerLevel', 'bloodIndex', 'newLandscape', 'peopleDaily', 'shadowPattern', 'dragonTrace', 'resourcesAccess', 'threats', 'legends', 'scenes'];

      function getOrderedNodeEntries(obj) {
        const order = new Map(NODE_FIELD_PRIORITY.map((key, index) => [key, index]));
        return Object.entries(obj)
          .map(([key, value], index) => ({
            key,
            value,
            index,
            priority: order.has(key) ? order.get(key) : Number.MAX_SAFE_INTEGER
          }))
          .sort((a, b) => {
            if (a.priority !== b.priority) return a.priority - b.priority;
            return a.index - b.index;
          })
          .map(({ key, value }) => [key, value]);
      }

      // ============ STATE ============
      const SPREAD = 2.0;
      const SCENE_VISIBLE_SCALE = 0.95;
      const SCENE_LABEL_VISIBLE_SCALE = 0.95;
      let viewX = 0, viewY = 0, scale = 0.65;
      let isDragging = false, dragStartX = 0, dragStartY = 0, dragViewX = 0, dragViewY = 0;
      let clickStartX = 0, clickStartY = 0;
      let nodeMap = {};
      nodes.forEach(n => { nodeMap[n.id] = n; });

      // Edit mode state
      let editMode = false;
      let deleteEdgeMode = false;
      let addEdgeMode = false;
      let edgeAddSourceId = null;
      let nodeDragging = null;
      let nodeDragStartX = 0, nodeDragStartY = 0;
      let nodeOrigX = 0, nodeOrigY = 0;
      let deletedEdges = []; // track deleted edges for undo
      // ============ DOM REFS ============
      const container = document.getElementById('map-container');
      const canvas = document.getElementById('edge-canvas');
      const ctx = canvas.getContext('2d');
      const nodeLayer = document.getElementById('node-layer');
      const tooltip = document.getElementById('tooltip');
      const minimap = document.getElementById('minimap');
      const minimapCtx = minimap.getContext('2d');
      const detailOverlay = document.getElementById('detail-overlay');
      const detailPanel = document.getElementById('detail-panel');
      const detailHeader = document.getElementById('detail-header');
      const detailSummary = document.getElementById('detail-summary');
      const detailBody = document.getElementById('detail-body');
      const detailClose = document.getElementById('detail-close');
      const WORLD_NAME = '龙族世界';

      function getLayerDisplayName(layerIdx = currentLayerIndex) {
        return WORLD_NAME;
      }

      function updateSpawnSelectBanner(selectedName = '') {
        return;
      }

      // 仅特异空间及奥丁之渊不可作为出生点；普通龙巢、禁区、隔离区和现实场景均可选择。
      const BLOCKED_SPAWN_IDS = new Set([
        'otherspace_rain_train',
        'otherspace_tokoyo',
        'otherspace_nibelungen',
        'otherspace_dreamcorridor',
        'otherspace_thriller_paradise',
        'nest_odin'
      ]);

      function getSpawnBlockedReason(node) {
        if (!node) return '';
        const nodeId = String(node.id || '').trim();
        const parentId = String(node.parentId || '').trim();
        const blockedId = BLOCKED_SPAWN_IDS.has(nodeId) ? nodeId : (BLOCKED_SPAWN_IDS.has(parentId) ? parentId : '');
        if (!blockedId) return '';
        if (blockedId === 'nest_odin') return '奥丁之渊无法作为初始出生点。';
        return '该地点属于特异空间，无法作为初始出生点。';
      }

      function showSpawnBlockedMessage(node) {
        const reason = getSpawnBlockedReason(node) || '该地点不可选为出生点。';
        window.alert(reason);
      }
      function buildSpawnSelectionPayload(node) {
        return {
          名称: node.name || '',
          大陆: getLayerDisplayName(currentLayerIndex),
          区域: node.name || '',
          场所: node.name || '',
          层级: node.tier || '',
          地区等级: node.dangerLevel || '',
          危险等级: node.dangerLevel || '',
          地貌特征: node.newLandscape || node.physicalConsequences?.terrain || node.summary || '',
          聚落描述: node.peopleDaily || node.brief || node.summary || '',
          周边威胁: node.monsters || node.environmentalHazards || node.danger || '',
          地点类型: (typeConfig[node.type] || typeConfig.poi || {}).label || '',
          节点ID: node.id || '',
          地图层级: currentLayerIndex
        };
      }

      const SPAWN_CHANNEL = 'dragon-spawn-map';

      function emitSpawnSelection(node) {
        const payload = buildSpawnSelectionPayload(node);
        if (!payload.名称) return;
        const reason = getSpawnBlockedReason(node);
        try {
          if (reason) {
            window.parent?.postMessage({ channel: SPAWN_CHANNEL, type: 'dragon_spawn_blocked', spawn: payload, reason }, '*');
            // 嵌入开局页时由父页面统一弹窗，避免同一次选择出现两遍提示。
            if (window.parent === window) showSpawnBlockedMessage(node);
          } else {
            updateSpawnSelectBanner(payload.名称);
            window.parent?.postMessage({ channel: SPAWN_CHANNEL, type: 'dragon_spawn_selected', spawn: payload }, '*');
          }
        } catch (e) {}
      }

      if (IS_SPAWN_SELECT_MODE) updateSpawnSelectBanner('');

      // ============ COORDINATE HELPERS ============
      function worldToScreen(wx, wy) {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        return {
          x: cx + (wx * SPREAD + viewX) * scale,
          y: cy + (wy * SPREAD + viewY) * scale
        };
      }

      function buildEdgePath(edge, src, tgt) {
        const s = worldToScreen(src.x, src.y);
        const t = worldToScreen(tgt.x, tgt.y);
        const curve = Number(edge.curve || 0);
        if (!Number.isFinite(curve) || Math.abs(curve) < 0.001) {
          return { s, t, c: null, curved: false };
        }

        const dx = t.x - s.x;
        const dy = t.y - s.y;
        const len = Math.hypot(dx, dy) || 1;
        return {
          s,
          t,
          curved: true,
          c: {
            x: (s.x + t.x) / 2 + (-dy / len) * len * curve,
            y: (s.y + t.y) / 2 + (dx / len) * len * curve,
          }
        };
      }

      function edgePathPoint(path, u = 0.5) {
        if (!path.curved || !path.c) {
          return {
            x: path.s.x + (path.t.x - path.s.x) * u,
            y: path.s.y + (path.t.y - path.s.y) * u,
          };
        }
        const a = (1 - u) * (1 - u);
        const b = 2 * (1 - u) * u;
        const c = u * u;
        return {
          x: a * path.s.x + b * path.c.x + c * path.t.x,
          y: a * path.s.y + b * path.c.y + c * path.t.y,
        };
      }

      function edgePathTangent(path, u = 0.5) {
        if (!path.curved || !path.c) {
          return { x: path.t.x - path.s.x, y: path.t.y - path.s.y };
        }
        return {
          x: 2 * (1 - u) * (path.c.x - path.s.x) + 2 * u * (path.t.x - path.c.x),
          y: 2 * (1 - u) * (path.c.y - path.s.y) + 2 * u * (path.t.y - path.c.y),
        };
      }

      // ============ RESIZE ============
      function resizeCanvas() {
        const dpr = devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        minimap.width = 168 * dpr;
        minimap.height = 128 * dpr;
        render();
      }
      window.addEventListener('resize', resizeCanvas);

      // ============ RENDER EDGES ============
      function renderEdges() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

        ctx.save();
        ctx.lineCap = 'round';

        function getEdgeStyle(edge) {
          if (edge.type === 'special') {
            return {
              strokeStyle: edge.curve ? 'rgba(178,63,206,0.55)' : 'rgba(178,63,206,0.5)',
              lineWidth: edge.curve ? 1.7 : 2.0,
              dash: edge.curve ? [3, 8] : [4, 6],
              labelColor: '#9a2fbf',
              labelBackground: 'rgba(255,255,255,0.9)',
              labelBorder: 'rgba(178,63,206,0.35)'
            };
          }
          if (edge.type === 'gateway') {
            return {
              strokeStyle: edge.curve ? 'rgba(47,127,214,0.5)' : 'rgba(178,63,206,0.42)',
              lineWidth: edge.curve ? 1.6 : 1.8,
              dash: edge.curve ? [2, 8] : [2, 8],
              labelColor: edge.curve ? '#2f6bb0' : '#9a2fbf',
              labelBackground: 'rgba(255,255,255,0.9)',
              labelBorder: edge.curve ? 'rgba(47,127,214,0.3)' : 'rgba(178,63,206,0.3)'
            };
          }
          if (edge.type === 'scene') {
            return {
              strokeStyle: 'rgba(120,140,170,0.42)',
              lineWidth: 1.1,
              dash: [2, 6],
              labelColor: '#7186a0',
              labelBackground: 'rgba(255,255,255,0.85)',
              labelBorder: 'rgba(120,145,180,0.28)'
            };
          }
          if (edge.type === 'route') {
            // cross-region proximity link — a touch stronger than local roads
            return {
              strokeStyle: 'rgba(90,120,158,0.5)',
              lineWidth: 1.5,
              dash: [7, 6],
              labelColor: '#3c4c62',
              labelBackground: 'rgba(255,255,255,0.9)',
              labelBorder: 'rgba(120,145,180,0.28)'
            };
          }
          // default local road (type 'road' / 'regional-mst' / legacy)
          return {
            strokeStyle: 'rgba(96,120,150,0.42)',
            lineWidth: 1.35,
            dash: [6, 7],
            labelColor: '#4a5c74',
            labelBackground: 'rgba(255,255,255,0.9)',
            labelBorder: 'rgba(120,145,180,0.28)'
          };
        }

        edges.forEach(e => {
          if (e.type === 'scene' && scale < SCENE_VISIBLE_SCALE) return;
          const src = nodeMap[e.source];
          const tgt = nodeMap[e.target];
          if (!src || !tgt) return;
          const style = getEdgeStyle(e);
          ctx.strokeStyle = style.strokeStyle;
          ctx.lineWidth = style.lineWidth * Math.max(0.6, scale);
          ctx.setLineDash(style.dash.map(v => v * Math.max(0.7, scale)));
          const path = buildEdgePath(e, src, tgt);
          ctx.beginPath();
          ctx.moveTo(path.s.x, path.s.y);
          if (path.curved) ctx.quadraticCurveTo(path.c.x, path.c.y, path.t.x, path.t.y);
          else ctx.lineTo(path.t.x, path.t.y);
          ctx.stroke();
        });
        ctx.restore();

        // Edge labels — avoid overlapping with node positions
        ctx.save();
        const labelFontSize = Math.max(10, Math.min(15, 11 * scale));
        ctx.font = `500 ${labelFontSize}px 'Noto Serif SC', serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Collect node screen rects for collision detection
        function textVisualUnits(text) {
          return [...String(text || '')].reduce((sum, ch) => sum + (/[\x00-\x7F]/.test(ch) ? 0.55 : 1), 0);
        }

        const nodeRects = [];
        nodes.forEach(n => {
          if (n.type === 'scene' && scale < SCENE_VISIBLE_SCALE) return;
          const p = worldToScreen(n.x, n.y);
          const cfg = typeConfig[n.type] || typeConfig.poi;
          const nodeScale = Math.min(1.2, Math.max(0.5, scale));
          const labelWidth = textVisualUnits(n.name) * cfg.labelSize + (n.type === 'scene' ? 16 : 24);
          const hw = (Math.max(cfg.size, labelWidth) * 0.5 + 12) * nodeScale;
          const hh = (cfg.size * 0.5 + cfg.labelSize * 0.85 + 18) * nodeScale;
          nodeRects.push({ x: p.x - hw, y: p.y - hh, w: hw * 2, h: hh * 2 });
        });

        function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
          return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
        }

        edges.forEach(e => {
          if (e.type === 'scene' && scale < SCENE_VISIBLE_SCALE) return;
          const src = nodeMap[e.source];
          const tgt = nodeMap[e.target];
          if (!src || !tgt) return;
          const style = getEdgeStyle(e);
          const path = buildEdgePath(e, src, tgt);
          const mid = edgePathPoint(path, 0.5);
          let mx = mid.x;
          let my = mid.y;
          if (scale < 0.92) return;
          const text = e.label || '';
          if (!text) return;
          const tw = ctx.measureText(text).width;
          const ph = Math.max(16, labelFontSize + 8);
          const pw = tw + 16;

          // Check overlap with any node and nudge if needed
          const tangent = edgePathTangent(path, 0.5);
          const dx = tangent.x;
          const dy = tangent.y;
          const len = Math.sqrt(dx * dx + dy * dy) || 1;
          // Perpendicular direction
          const nx = -dy / len;
          const ny = dx / len;
          const nudgeStep = 18;
          let blocked = false;
          for (let attempt = 0; attempt < 6; attempt++) {
            let overlaps = false;
            for (const nr of nodeRects) {
              if (rectsOverlap(mx - pw / 2, my - ph / 2, pw, ph, nr.x, nr.y, nr.w, nr.h)) {
                overlaps = true;
                break;
              }
            }
            if (!overlaps) break;
            // Alternate nudge direction: perpendicular, then along edge
            if (attempt % 2 === 0) {
              mx += nx * nudgeStep;
              my += ny * nudgeStep;
            } else {
              mx -= nx * nudgeStep * 2;
              my -= ny * nudgeStep * 2;
            }
            blocked = attempt === 5;
          }
          if (blocked) return;

          ctx.fillStyle = style.labelBackground || 'rgba(12,18,28,0.78)';
          ctx.beginPath();
          ctx.roundRect(mx - pw / 2, my - ph / 2, pw, ph, 4);
          ctx.fill();
          ctx.strokeStyle = style.labelBorder || 'rgba(138,122,90,0.2)';
          ctx.lineWidth = 0.6;
          ctx.setLineDash([]);
          ctx.stroke();
          ctx.fillStyle = style.labelColor || '#c8b890';
          ctx.fillText(text, mx, my);
        });
        ctx.restore();
      }

      // ============ RENDER NODES ============
      let nodeElements = [];
      function createNodeElements() {
        nodeLayer.innerHTML = '';
        nodeElements = [];
        nodes.forEach(n => {
          const cfg = typeConfig[n.type] || typeConfig.poi;
          const wrapper = document.createElement('div');
          wrapper.className = 'node-wrapper';
          wrapper.dataset.id = n.id;
          wrapper.dataset.type = n.type;
          wrapper.style.setProperty('--nc', TYPE_COLORS[n.type] || TYPE_COLORS.poi);
          if (['city', 'castle', 'campus', 'stronghold'].includes(n.type)) wrapper.dataset.tier = 'major';

          const iconSize = cfg.size;
          const iconDiv = document.createElement('div');
          iconDiv.className = 'node-icon';
          if (n.type === 'otherspace') {
            // ornate icon fills the whole footprint, no disc
            iconDiv.innerHTML = `<svg width="${iconSize}" height="${iconSize}" viewBox="0 0 32 32"><use href="#icon-${n.type}"/></svg>`;
          } else {
            iconDiv.style.width = iconSize + 'px';
            iconDiv.style.height = iconSize + 'px';
            const glyph = Math.round(iconSize * 0.56);
            iconDiv.innerHTML = `<svg width="${glyph}" height="${glyph}" viewBox="0 0 32 32"><use href="#icon-${n.type}"/></svg>`;
          }

          const label = document.createElement('div');
          label.className = 'node-label';
          label.style.fontSize = cfg.labelSize + 'px';
          if (n.type === 'scene') {
            label.style.padding = '1px 7px';
            label.style.background = 'rgba(255,255,255,0.82)';
            label.style.color = '#55637a';
            label.style.fontWeight = '500';
          }
          if (cfg.bold) label.style.fontWeight = '600';
          label.textContent = n.name;

          wrapper.appendChild(iconDiv);
          wrapper.appendChild(label);

          // ============ SPECIAL MARKERS ============
          if (IS_SPAWN_SELECT_MODE && n.id === 'city_hometown') {
            const markerBg = document.createElement('div');
            markerBg.className = 'special-marker-recommended';
            markerBg.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;';
            wrapper.insertBefore(markerBg, iconDiv);
            const badge = document.createElement('div');
            badge.className = 'special-badge-recommended';
            badge.textContent = '推荐出生点';
            wrapper.appendChild(badge);
          }
          if (n.independent) {
            const markerBg = document.createElement('div');
            markerBg.className = 'special-marker-layer3';
            markerBg.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;';
            wrapper.insertBefore(markerBg, iconDiv);
            const badge = document.createElement('div');
            badge.className = 'special-badge-layer3';
            badge.textContent = '◇ 独立异空间';
            wrapper.appendChild(badge);
          }

          if (n.id === 'otherspace_thriller_paradise') {
            const markerBg = document.createElement('div');
            markerBg.className = 'special-marker-worldscar';
            markerBg.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;';
            wrapper.insertBefore(markerBg, iconDiv);
            const badge = document.createElement('div');
            badge.className = 'special-badge-worldscar';
            badge.textContent = '◆ 来吧，参与这超越思维的游戏';
            wrapper.appendChild(badge);
          }

          // Tooltip events
          wrapper.addEventListener('mouseenter', () => {
            tooltip.style.display = 'block';
            document.getElementById('tt-name').textContent = n.fullName || n.name;
            document.getElementById('tt-type').textContent = cfg.label;
            document.getElementById('tt-summary').textContent = (n.brief || n.summary || '').replace(/\n/g, ' ').substring(0, 140);
          });
          wrapper.addEventListener('mousemove', (ev) => {
            tooltip.style.left = (ev.clientX + 14) + 'px';
            tooltip.style.top = (ev.clientY + 14) + 'px';
            const tr = tooltip.getBoundingClientRect();
            if (tr.right > window.innerWidth - 8) tooltip.style.left = (ev.clientX - tr.width - 10) + 'px';
            if (tr.bottom > window.innerHeight - 8) tooltip.style.top = (ev.clientY - tr.height - 10) + 'px';
          });
          wrapper.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
          });

          // Click to open detail OR drag node in edit mode
          wrapper.addEventListener('mousedown', (ev) => {
            clickStartX = ev.clientX;
            clickStartY = ev.clientY;
            if (editMode) {
              ev.stopPropagation();
              if (addEdgeMode) return;
              nodeDragging = n;
              nodeDragStartX = ev.clientX;
              nodeDragStartY = ev.clientY;
              nodeOrigX = n.x;
              nodeOrigY = n.y;
            }
          });
          wrapper.addEventListener('mouseup', (ev) => {
            const dx = Math.abs(ev.clientX - clickStartX);
            const dy = Math.abs(ev.clientY - clickStartY);

            if (editMode && addEdgeMode) {
              if (dx < 5 && dy < 5) {
                tooltip.style.display = 'none';
                handleEdgeAddNodeClick(n);
              }
              return;
            }

            if (nodeDragging === n) {
              nodeDragging = null;
              if (dx < 5 && dy < 5) return; // was just a click, no drag
              return; // finished dragging
            }
            if (dx < 5 && dy < 5 && !editMode) {
              tooltip.style.display = 'none';
              if (IS_SPAWN_SELECT_MODE) emitSpawnSelection(n);
              else openDetail(n);
            }
          });

          wrapper.classList.toggle('editing', editMode);
          wrapper.classList.toggle('edge-source', addEdgeMode && edgeAddSourceId === n.id);
          nodeLayer.appendChild(wrapper);
          nodeElements.push({ el: wrapper, node: n });
        });
      }

      function updateNodePositions() {
        nodeElements.forEach(({ el, node }) => {
          if (node.type === 'scene' && scale < SCENE_VISIBLE_SCALE) {
            el.style.display = 'none';
            return;
          }
          el.style.display = '';
          const pos = worldToScreen(node.x, node.y);
          el.style.left = pos.x + 'px';
          el.style.top = pos.y + 'px';
          el.style.transform = `translate(-50%,-50%) scale(${Math.min(1.2, Math.max(0.5, scale))})`;
          const lbl = el.querySelector('.node-label');
          if (lbl) {
            if (node.type === 'scene') {
              lbl.style.opacity = scale < SCENE_LABEL_VISIBLE_SCALE ? '0' : scale < 1.25 ? '0.72' : '0.92';
            } else {
              lbl.style.opacity = scale < 0.35 ? '0' : scale < 0.55 ? '0.6' : '1';
            }
          }
        });
        resolveSceneLabelOverlaps();
      }

      function getPaddedRect(rect, pad) {
        return {
          left: rect.left - pad,
          top: rect.top - pad,
          right: rect.right + pad,
          bottom: rect.bottom + pad,
        };
      }

      function screenRectsOverlap(a, b) {
        return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
      }

      function resolveSceneLabelOverlaps() {
        // 地点名优先级高于路网标签；子地点出现时不再被避让逻辑直接隐藏。
        return;
        const placedRects = [];
        const sceneLabels = [];

        nodeElements.forEach(({ el, node }) => {
          if (el.style.display === 'none') return;
          const label = el.querySelector('.node-label');
          if (!label) return;

          if (node.type === 'scene') {
            sceneLabels.push({ label, node });
            return;
          }

          if (label.style.opacity !== '0') {
            placedRects.push(getPaddedRect(label.getBoundingClientRect(), 8));
          }
        });

        sceneLabels.forEach(({ label }) => {
          if (scale < SCENE_LABEL_VISIBLE_SCALE) {
            label.style.opacity = '0';
            return;
          }

          const rect = getPaddedRect(label.getBoundingClientRect(), 6);
          const overlaps = placedRects.some(placed => screenRectsOverlap(rect, placed));
          if (overlaps) {
            label.style.opacity = '0';
            return;
          }

          label.style.opacity = scale < 1.7 ? '0.58' : '0.86';
          placedRects.push(rect);
        });
      }

      // ============ DETAIL MODAL ============
      function openDetail(node) {
        const cfg = typeConfig[node.type] || typeConfig.poi;
        const iconSize = 26;
        const dc = TYPE_COLORS[node.type] || TYPE_COLORS.poi;
        const briefText = typeof node.brief === 'string' ? node.brief.trim() : '';
        const summaryText = typeof node.summary === 'string' ? node.summary.trim() : '';

        // Header: icon + name + type badge
        detailHeader.innerHTML = `
    <div class="detail-title">
      <span style="width:46px;height:46px;flex-shrink:0;border-radius:13px;display:grid;place-items:center;background:${dc};box-shadow:0 6px 16px -4px ${dc};color:#fff;">
        <svg width="${iconSize}" height="${iconSize}" viewBox="0 0 32 32"><use href="#icon-${node.type}"/></svg>
      </span>
      <span>${escHtml(node.name)}</span>
    </div>
    <div style="margin-top:6px; display:flex; flex-wrap:wrap; gap:8px;">
      <span class="detail-type-badge" style="background:color-mix(in srgb, ${dc} 12%, #fff); color:${dc}; border-color:color-mix(in srgb, ${dc} 32%, #fff);">${cfg.label}</span>
      ${node.tier ? `<span class="detail-type-badge" style="background:rgba(90,120,160,0.1); color:#4a5c74; border-color:rgba(120,145,180,0.28);">${escHtml(node.tier)}</span>` : ''}
    </div>
  `;

        // Brief / Summary
        if (briefText) {
          detailSummary.textContent = briefText;
          detailSummary.style.display = '';
        } else if (summaryText) {
          detailSummary.textContent = summaryText;
          detailSummary.style.display = '';
        } else {
          detailSummary.style.display = 'none';
        }

        // Body
        let bodyHtml = '';

        function formatDetailText(str) {
          const normalized = String(str)
            .trim()
            .replace(/。；/g, '；')
            .replace(/；\s*；+/g, '；')
            .replace(/\s+；/g, '；')
            .replace(/；\s+/g, '；');
          if (!normalized) return '';

          const parts = normalized
            .split(/；(?=[^；：\n]{1,12}：)/)
            .map(part => part.trim())
            .filter(Boolean);
          const looksStructured = parts.length >= 2 && parts.every(part => /^[^；：\n]{1,12}：/.test(part));
          if (!looksStructured) return escHtml(normalized);

          return `<div class="detail-kv-list">${parts.map(part => {
            const idx = part.indexOf('：');
            const key = part.slice(0, idx).trim();
            const value = part.slice(idx + 1).trim().replace(/；$/g, '');
            return `<div class="detail-kv-row">
          <div class="detail-kv-key">${escHtml(key)}：</div>
          <div class="detail-kv-value">${escHtml(value)}</div>
        </div>`;
          }).join('')}</div>`;
        }

        if (briefText && summaryText && briefText !== summaryText) {
          bodyHtml += `<div class="detail-section">
        <div class="detail-section-title">概述</div>
        <div class="detail-section-content">${formatDetailText(summaryText)}</div>
      </div>`;
        }

        // Physical Consequences grid
        if (node.physicalConsequences && typeof node.physicalConsequences === 'object') {
          const pc = node.physicalConsequences;
          // 过滤空值和无意义占位文本
          const TRIVIAL_RE = /^(因.*而异|正常|倒置|无$|无水|无水源|N\/A|未知|待定)/;
          const entries = Object.entries(pc).filter(([k, v]) => {
            if (!v) return false;
            const s = String(v).trim();
            if (!s) return false;
            if (TRIVIAL_RE.test(s)) return false;
            // 非 terrain 字段：过于简短的值（<=4字）没有信息量
            if (k !== 'terrain' && s.length <= 4) return false;
            return true;
          });
          if (entries.length > 0) {
            bodyHtml += `<div class="detail-section">
        <div class="detail-section-title">环境</div>
        <div class="detail-grid">`;
            entries.forEach(([key, val]) => {
              const label = PHYSICAL_LABELS[key] || key;
              bodyHtml += `<div class="detail-grid-item">
          <div class="grid-label">${escHtml(label)}</div>
          <div class="grid-value">${escHtml(String(val))}</div>
        </div>`;
            });
            bodyHtml += `</div></div>`;
          }
        }

        // All other fields
        for (const [key, val] of getOrderedNodeEntries(node)) {
          if (SKIP_FIELDS.has(key)) continue;
          if (key === 'tier') continue; // already shown in header
          if (!FIELD_LABELS[key]) continue; // unknown field, skip
          if (val === null || val === undefined) continue;

          // Check emptiness
          if (Array.isArray(val)) {
            if (val.length === 0) continue;
            // Render as tags
            bodyHtml += `<div class="detail-section">
        <div class="detail-section-title">${escHtml(FIELD_LABELS[key])}</div>
        <div class="detail-tags">`;
            val.forEach(item => {
              bodyHtml += `<span class="detail-tag">${escHtml(String(item))}</span>`;
            });
            bodyHtml += `</div></div>`;
          } else if (typeof val === 'object') {
            // Skip objects (physicalConsequences already handled)
            continue;
          } else {
            const strVal = String(val).trim();
            if (!strVal) continue;
            bodyHtml += `<div class="detail-section">
        <div class="detail-section-title">${escHtml(FIELD_LABELS[key])}</div>
        <div class="detail-section-content">${formatDetailText(strVal)}</div>
      </div>`;
          }
        }

        // Connected locations
        const connections = [];
        edges.forEach(e => {
          if (e.source === node.id && nodeMap[e.target]) {
            connections.push({ node: nodeMap[e.target], label: e.label, distance: e.distance });
          } else if (e.target === node.id && nodeMap[e.source]) {
            connections.push({ node: nodeMap[e.source], label: e.label, distance: e.distance });
          }
        });
        if (connections.length > 0) {
          bodyHtml += `<div class="detail-connections">
      <div class="detail-section-title">连接地点</div>
      <div style="display:flex; flex-wrap:wrap;">`;
          connections.forEach(c => {
            const cCfg = typeConfig[c.node.type] || typeConfig.poi;
            bodyHtml += `<div class="detail-conn-item" data-target-id="${c.node.id}">
        <svg width="16" height="16" viewBox="0 0 32 32" style="flex-shrink:0;"><use href="#icon-${c.node.type}"/></svg>
        <span>${escHtml(c.node.name)}</span>
        ${c.label ? `<span class="detail-conn-dist">· ${escHtml(c.label)}</span>` : ''}
        ${c.distance ? `<span class="detail-conn-dist">(${escHtml(String(c.distance))})</span>` : ''}
      </div>`;
          });
          bodyHtml += `</div></div>`;
        }

        detailBody.innerHTML = bodyHtml;

        // Make connection items clickable
        detailBody.querySelectorAll('.detail-conn-item').forEach(el => {
          el.addEventListener('click', () => {
            const targetId = el.dataset.targetId;
            const targetNode = nodeMap[targetId];
            if (targetNode) openDetail(targetNode);
          });
        });

        // Show modal
        detailOverlay.classList.add('active');
        detailPanel.scrollTop = 0;
      }

      function escHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // Close detail modal
      detailClose.addEventListener('click', () => {
        detailOverlay.classList.remove('active');
      });
      detailOverlay.addEventListener('click', (e) => {
        if (e.target === detailOverlay) detailOverlay.classList.remove('active');
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') detailOverlay.classList.remove('active');
      });

      // ============ MINIMAP ============
      function renderMinimap() {
        const dpr = devicePixelRatio;
        const mw = 168 * dpr, mh = 128 * dpr;
        minimapCtx.clearRect(0, 0, mw, mh);

        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        nodes.forEach(n => {
          if (n.type === 'scene') return;
          const wx = n.x * SPREAD, wy = n.y * SPREAD;
          if (wx < minX) minX = wx; if (wx > maxX) maxX = wx;
          if (wy < minY) minY = wy; if (wy > maxY) maxY = wy;
        });
        const pad = 100;
        minX -= pad; maxX += pad; minY -= pad; maxY += pad;
        const rangeX = maxX - minX, rangeY = maxY - minY;
        const mScale = Math.min(mw / rangeX, mh / rangeY) * 0.9;
        const offX = (mw - rangeX * mScale) / 2;
        const offY = (mh - rangeY * mScale) / 2;

        function miniPos(wx, wy) {
          return { x: offX + (wx - minX) * mScale, y: offY + (wy - minY) * mScale };
        }

        // Edges
        minimapCtx.strokeStyle = 'rgba(120,140,170,0.35)';
        minimapCtx.lineWidth = 0.6 * dpr;
        minimapCtx.setLineDash([]);
        edges.forEach(e => {
          if (e.type === 'scene') return;
          const src = nodeMap[e.source], tgt = nodeMap[e.target];
          if (!src || !tgt) return;
          const s = miniPos(src.x * SPREAD, src.y * SPREAD);
          const t = miniPos(tgt.x * SPREAD, tgt.y * SPREAD);
          minimapCtx.beginPath();
          minimapCtx.moveTo(s.x, s.y);
          minimapCtx.lineTo(t.x, t.y);
          minimapCtx.stroke();
        });

        // Nodes
        nodes.forEach(n => {
          if (n.type === 'scene') return;
          const p = miniPos(n.x * SPREAD, n.y * SPREAD);
          if (n.id === 'otherspace_thriller_paradise') {
            minimapCtx.fillStyle = '#dd7a2b';
            minimapCtx.beginPath();
            minimapCtx.arc(p.x, p.y, 3.5 * dpr, 0, Math.PI * 2);
            minimapCtx.fill();
          } else if (n.independent) {
            minimapCtx.fillStyle = '#b23fce';
            minimapCtx.beginPath();
            minimapCtx.arc(p.x, p.y, 3.5 * dpr, 0, Math.PI * 2);
            minimapCtx.fill();
          } else {
            minimapCtx.fillStyle = TYPE_COLORS[n.type] || '#6b7d94';
            minimapCtx.beginPath();
            minimapCtx.arc(p.x, p.y, (['city', 'campus', 'stronghold'].includes(n.type) ? 2.8 : 1.7) * dpr, 0, Math.PI * 2);
            minimapCtx.fill();
          }
        });

        // Viewport rect
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        const vpLeft = (-viewX - cx / scale), vpTop = (-viewY - cy / scale);
        const vpRight = (-viewX + cx / scale), vpBottom = (-viewY + cy / scale);
        const tl = miniPos(vpLeft, vpTop);
        const br = miniPos(vpRight, vpBottom);
        minimapCtx.strokeStyle = 'rgba(47,127,214,0.85)';
        minimapCtx.lineWidth = 1.4 * dpr;
        minimapCtx.setLineDash([]);
        minimapCtx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
      }

      // ============ LEGEND ============
      function buildLegend() {
        const legendItems = document.getElementById('legend-items');
        const usedTypes = new Set(nodes.map(n => n.type));
        Object.keys(typeConfig).forEach(type => {
          if (!usedTypes.has(type)) return;
          const cfg = typeConfig[type];
          const item = document.createElement('div');
          item.style.cssText = 'display:flex; align-items:center; gap:7px; padding:1px 0;';
          item.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 32 32" style="flex-shrink:0; color:${TYPE_COLORS[type] || '#6b7d94'};"><use href="#icon-${type}"/></svg>
      <span style="font-size:12px; color:#3c4c62; white-space:nowrap;">${cfg.label}</span>
    `;
          legendItems.appendChild(item);
        });

        // Special marker legends
        const specialSep = document.createElement('div');
        specialSep.style.cssText = 'grid-column:1/-1; border-top:1px solid rgba(120,145,180,0.2); margin:6px 0 2px; padding-top:6px; font-size:11px; color:#4a5c74; font-weight:700; letter-spacing:0.5px;';
        specialSep.textContent = '特殊标记';
        legendItems.appendChild(specialSep);

        const independentLegend = document.createElement('div');
        independentLegend.style.cssText = 'display:flex; align-items:center; gap:7px; padding:1px 0;';
        independentLegend.innerHTML = `
    <span style="display:inline-block;width:14px;height:14px;border-radius:50%;border:2px dashed rgba(178,63,206,0.7);flex-shrink:0;"></span>
    <span style="font-size:12px; color:#9a2fbf; white-space:nowrap;">独立异空间</span>
  `;
        legendItems.appendChild(independentLegend);

        const thrillerLegend = document.createElement('div');
        thrillerLegend.style.cssText = 'display:flex; align-items:center; gap:7px; padding:1px 0;';
        thrillerLegend.innerHTML = `
    <span style="display:inline-block;width:14px;height:14px;border-radius:50%;border:2px solid rgba(221,122,43,0.75);flex-shrink:0;"></span>
    <span style="font-size:12px; color:#c0632a; white-space:nowrap;">中国沿海异常点</span>
  `;
        legendItems.appendChild(thrillerLegend);

        // 玩家位置图例
        const playerLegend = document.createElement('div');
        playerLegend.style.cssText = 'display:flex; align-items:center; gap:7px; padding:1px 0;';
        playerLegend.innerHTML = `
    <span style="display:inline-block;width:14px;height:14px;border-radius:50%;border:2px solid rgba(20,170,110,0.75);flex-shrink:0;"></span>
    <span style="font-size:12px; color:#12a06e; white-space:nowrap;">当前位置</span>
  `;
        legendItems.appendChild(playerLegend);
      }

      // ============ MAIN RENDER ============
      function render() {
        renderEdges();
        updateNodePositions();
        renderMinimap();
        if (editMode && deleteEdgeMode) updateEdgeHitAreas();
      }

      // ============ PAN ============
      container.addEventListener('mousedown', (e) => {
        if (e.target.closest('.node-wrapper')) return;
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragViewX = viewX;
        dragViewY = viewY;
        container.classList.add('grabbing');
      });
      window.addEventListener('mousemove', (e) => {
        // Node dragging in edit mode
        if (nodeDragging) {
          const dx = (e.clientX - nodeDragStartX) / scale / SPREAD;
          const dy = (e.clientY - nodeDragStartY) / scale / SPREAD;
          nodeDragging.x = nodeOrigX + dx;
          nodeDragging.y = nodeOrigY + dy;
          render();
          return;
        }
        if (!isDragging) return;
        viewX = dragViewX + (e.clientX - dragStartX) / scale;
        viewY = dragViewY + (e.clientY - dragStartY) / scale;
        render();
      });
      window.addEventListener('mouseup', () => {
        if (nodeDragging) { nodeDragging = null; return; }
        isDragging = false;
        container.classList.remove('grabbing');
      });

      // ============ ZOOM ============
      container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const wx = (e.clientX - cx) / scale - viewX;
        const wy = (e.clientY - cy) / scale - viewY;
        scale *= zoomFactor;
        scale = Math.max(0.15, Math.min(3, scale));
        viewX = (e.clientX - cx) / scale - wx;
        viewY = (e.clientY - cy) / scale - wy;
        render();
      }, { passive: false });

      function zoomIn() { scale = Math.min(3, scale * 1.2); render(); }
      function zoomOut() { scale = Math.max(0.15, scale / 1.2); render(); }
      function resetView() {
        if (lastMatchedNodeId && nodeMap[lastMatchedNodeId]) {
          const n = nodeMap[lastMatchedNodeId];
          viewX = -n.x * SPREAD;
          viewY = -n.y * SPREAD;
        } else {
          viewX = 0; viewY = 0;
        }
        scale = 0.65; render();
      }
      window.zoomIn = zoomIn; window.zoomOut = zoomOut; window.resetView = resetView;

      // ============ TOUCH SUPPORT ============
      let lastTouchDist = 0;
      let lastTouchCenter = null;
      container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          isDragging = true;
          dragStartX = e.touches[0].clientX;
          dragStartY = e.touches[0].clientY;
          dragViewX = viewX;
          dragViewY = viewY;
        } else if (e.touches.length === 2) {
          isDragging = false;
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          lastTouchDist = Math.sqrt(dx * dx + dy * dy);
          lastTouchCenter = {
            x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
            y: (e.touches[0].clientY + e.touches[1].clientY) / 2
          };
        }
      }, { passive: true });
      container.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 1 && isDragging) {
          viewX = dragViewX + (e.touches[0].clientX - dragStartX) / scale;
          viewY = dragViewY + (e.touches[0].clientY - dragStartY) / scale;
          render();
        } else if (e.touches.length === 2) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (lastTouchDist > 0) {
            const zoomFactor = dist / lastTouchDist;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const tcx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const tcy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            const wx = (tcx - cx) / scale - viewX;
            const wy = (tcy - cy) / scale - viewY;
            scale *= zoomFactor;
            scale = Math.max(0.15, Math.min(3, scale));
            viewX = (tcx - cx) / scale - wx;
            viewY = (tcy - cy) / scale - wy;
            render();
          }
          lastTouchDist = dist;
        }
      }, { passive: false });
      container.addEventListener('touchend', () => {
        isDragging = false;
        lastTouchDist = 0;
        lastTouchCenter = null;
      });

      // ============ EDIT MODE ============
      function updateEdgePickHighlight() {
        nodeElements.forEach(({ el, node }) => {
          el.classList.toggle('edge-source', addEdgeMode && edgeAddSourceId === node.id);
        });
      }

      function updateEditHint() {
        const hint = document.getElementById('edit-hint');
        if (!hint) return;
        if (!editMode) {
          hint.textContent = '';
          return;
        }
        if (addEdgeMode) {
          if (edgeAddSourceId && nodeMap[edgeAddSourceId]) {
            hint.textContent = `已选起点：${nodeMap[edgeAddSourceId].name}，点击目标节点创建连线`;
          } else {
            hint.textContent = '点击一个节点作为起点，再点击另一个节点作为终点';
          }
          return;
        }
        if (deleteEdgeMode) {
          hint.textContent = '点击连线中间的 × 删除';
          return;
        }
        hint.textContent = '拖拽节点调整位置';
      }

      function edgeExists(a, b) {
        return edges.some(e => (
          (e.source === a && e.target === b) ||
          (e.source === b && e.target === a)
        ));
      }

      function handleEdgeAddNodeClick(node) {
        if (!editMode || !addEdgeMode) return;
        const hint = document.getElementById('edit-hint');

        if (!edgeAddSourceId) {
          edgeAddSourceId = node.id;
          updateEdgePickHighlight();
          updateEditHint();
          return;
        }

        if (edgeAddSourceId === node.id) {
          edgeAddSourceId = null;
          updateEdgePickHighlight();
          updateEditHint();
          return;
        }

        const sourceId = edgeAddSourceId;
        const targetId = node.id;
        const srcName = nodeMap[sourceId]?.name || sourceId;
        const tgtName = nodeMap[targetId]?.name || targetId;

        if (edgeExists(sourceId, targetId)) {
          edgeAddSourceId = targetId;
          updateEdgePickHighlight();
          hint.textContent = `连线已存在：${srcName} ↔ ${tgtName}，已切换起点`;
          setTimeout(() => {
            if (editMode && addEdgeMode) updateEditHint();
          }, 1500);
          return;
        }

        let label = window.prompt('请输入连线标签（可留空）', '');
        if (label === null) label = '';
        label = label.trim();

        edges.push({ source: sourceId, target: targetId, label });
        edgeAddSourceId = targetId;
        updateEdgePickHighlight();
        render();

        hint.textContent = `已添加连线：${srcName} → ${tgtName}`;
        setTimeout(() => {
          if (editMode && addEdgeMode) updateEditHint();
        }, 1500);
      }

      function toggleEditMode() {
        editMode = !editMode;
        deleteEdgeMode = false;
        addEdgeMode = false;
        edgeAddSourceId = null;
        const btn = document.getElementById('btn-edit-mode');
        const btnAdd = document.getElementById('btn-add-edge');
        const btnDel = document.getElementById('btn-delete-edge');
        const btnExp = document.getElementById('btn-export');
        btn.classList.toggle('active', editMode);
        btnAdd.style.display = editMode ? '' : 'none';
        btnDel.style.display = editMode ? '' : 'none';
        btnExp.style.display = editMode ? '' : 'none';
        btnAdd.classList.remove('active');
        btnDel.classList.remove('active');
        updateEditHint();
        // Toggle node cursor
        nodeElements.forEach(({ el }) => {
          el.classList.toggle('editing', editMode);
        });
        updateEdgePickHighlight();
        updateEdgeHitAreas();
      }

      function toggleAddEdge() {
        if (!editMode) return;
        addEdgeMode = !addEdgeMode;
        const btnAdd = document.getElementById('btn-add-edge');
        const btnDel = document.getElementById('btn-delete-edge');

        if (addEdgeMode) {
          deleteEdgeMode = false;
          edgeAddSourceId = null;
          btnDel.classList.remove('active');
        } else {
          edgeAddSourceId = null;
        }

        btnAdd.classList.toggle('active', addEdgeMode);
        updateEdgePickHighlight();
        updateEditHint();
        updateEdgeHitAreas();
      }

      function toggleDeleteEdge() {
        if (!editMode) return;
        deleteEdgeMode = !deleteEdgeMode;
        const btnAdd = document.getElementById('btn-add-edge');
        const btn = document.getElementById('btn-delete-edge');

        if (deleteEdgeMode) {
          addEdgeMode = false;
          edgeAddSourceId = null;
          btnAdd.classList.remove('active');
        }

        btn.classList.toggle('active', deleteEdgeMode);
        updateEdgePickHighlight();
        updateEditHint();
        updateEdgeHitAreas();
      }

      // Edge delete hit areas
      let edgeHitLayer = null;
      function updateEdgeHitAreas() {
        if (!edgeHitLayer) {
          edgeHitLayer = document.createElement('div');
          edgeHitLayer.id = 'edge-hit-layer';
          edgeHitLayer.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;';
          container.appendChild(edgeHitLayer);
        }
        edgeHitLayer.innerHTML = '';
        if (!editMode || !deleteEdgeMode) return;

        edges.forEach((e, idx) => {
          const src = nodeMap[e.source];
          const tgt = nodeMap[e.target];
          if (!src || !tgt) return;
          const path = buildEdgePath(e, src, tgt);
          const mid = edgePathPoint(path, 0.5);
          const mx = mid.x;
          const my = mid.y;

          const btn = document.createElement('div');
          btn.className = 'edge-delete-hit';
          btn.style.cssText = `
      left:${mx - 12}px; top:${my - 12}px; width:24px; height:24px;
      background:rgba(180,50,50,0.8); border-radius:50%; pointer-events:auto;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; color:#fff; cursor:pointer; border:1px solid rgba(255,100,100,0.5);
    `;
          btn.textContent = '×';
          btn.title = `删除: ${e.label || e.source + ' → ' + e.target}`;
          btn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            deletedEdges.push(edges.splice(idx, 1)[0]);
            render();
            updateEdgeHitAreas();
          });
          edgeHitLayer.appendChild(btn);
        });
      }

      // Re-render hit areas on pan/zoom is handled in render()

      function exportData() {
        // Build updated JSON
        const exportObj = JSON.parse(JSON.stringify(MAP_DATA.mapData ? MAP_DATA : { mapData: MAP_DATA.mapData }));
        // Update node positions
        const expMapData = exportObj.mapData || exportObj;
        expMapData.nodes = nodes.map(n => {
          const copy = {};
          for (const [k, v] of getOrderedNodeEntries(n)) {
            copy[k] = v;
          }
          // Round coordinates
          copy.x = Math.round(n.x * 100) / 100;
          copy.y = Math.round(n.y * 100) / 100;
          return copy;
        });
        expMapData.edges = edges.map(e => ({ ...e }));

        const jsonStr = JSON.stringify(exportObj, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'dragon_map_edited.json';
        a.click();
        URL.revokeObjectURL(url);

        document.getElementById('edit-hint').textContent = '已导出 dragon_map_edited.json';
        setTimeout(() => {
          if (editMode) updateEditHint();
        }, 3000);
      }

      window.toggleEditMode = toggleEditMode;
      window.toggleAddEdge = toggleAddEdge;
      window.toggleDeleteEdge = toggleDeleteEdge;
      window.exportData = exportData;

      // ============ LAYER SWITCHING ============
      async function switchLayer(layerIdx) {
        if (layerIdx === currentLayerIndex) return;
        const data = await loadLayerData(layerIdx);
        if (!data) {
          alert('地图数据加载失败，请确保 dragon_mapdata.js 与地图文件位于同一目录');
          return;
        }
        currentLayerIndex = layerIdx;
        mapData = data.mapData;
        nodes = mapData.nodes;
        edges = mapData.edges || [];
        nodeMap = {};
        nodes.forEach(n => { nodeMap[n.id] = n; });

        // 更新标题
        document.getElementById('map-title').textContent = mapData.title || '深渊都市 · ABYSS METROPOLIS';

        // 更新背景主题
        document.body.style.background = LAYER_THEMES[layerIdx] || LAYER_THEMES[0];

        // 退出编辑模式
        if (editMode) toggleEditMode();

        // 重置视图
        viewX = 0; viewY = 0; scale = 0.65;

        // 重建节点和图例
        createNodeElements();
        // 重建图例
        const legendItems = document.getElementById('legend-items');
        legendItems.innerHTML = '';
        buildLegend();

        // 重建玩家位置标记（因为 nodeLayer 被清空了）
        lastMatchedNodeId = null;
        updatePlayerLocation();

        render();
      }
      window.switchLayer = switchLayer;

      // ============ MVU 接入层 — 通过 postMessage 接收位置数据 ============
      // map.html 作为跨域 iframe 嵌入在底部状态栏中，无法直接访问 Mvu
      // 由底部状态栏通过 postMessage 推送位置数据

      let _mvuLocation = { 场所: '', 区域: '', 大陆: '' };

      // 玩家位置标记 — 直接附加到匹配节点的 wrapper 上（同入口标记方式）
      let lastMatchedNodeId = null;

      function removePlayerMarker() {
        document.querySelectorAll('.special-marker-player, .special-badge-player').forEach(el => el.remove());
      }

      function updatePlayerLocation() {
        const 场所 = _mvuLocation.场所 || '';
        const 区域 = _mvuLocation.区域 || '';
        const 大陆 = _mvuLocation.大陆 || '';

        if (!场所 && !区域 && !大陆) {
          removePlayerMarker();
          lastMatchedNodeId = null;
          return;
        }

        const matchedNode = findMatchingNode(场所, 区域, 大陆);

        if (!matchedNode) {
          removePlayerMarker();
          lastMatchedNodeId = null;
          return;
        }

        // 如果匹配的节点没变，不需要重建
        if (lastMatchedNodeId === matchedNode.id && document.querySelector('.special-badge-player')) return;

        // 移除旧标记
        removePlayerMarker();
        lastMatchedNodeId = matchedNode.id;

        // 找到对应的 node-wrapper
        const wrapper = nodeLayer.querySelector(`.node-wrapper[data-id="${matchedNode.id}"]`);
        if (!wrapper) return;

        // 插入标记背景（同入口标记方式）
        const markerBg = document.createElement('div');
        markerBg.className = 'special-marker-player';
        markerBg.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;';
        const iconDiv = wrapper.querySelector('.node-icon');
        if (iconDiv) wrapper.insertBefore(markerBg, iconDiv);
        else wrapper.prepend(markerBg);

        // 插入标签
        const displayName = 场所 || 区域 || matchedNode.name;
        const badge = document.createElement('div');
        badge.className = 'special-badge-player';
        badge.textContent = `📍 ${displayName}`;
        wrapper.appendChild(badge);
      }

      function normalizeStr(s) {
        // 统一全角半角、去除空格，便于模糊匹配
        return s.replace(/\s+/g, '').replace(/·/g, '·').replace(/\./g, '·').replace(/・/g, '·').replace(/‧/g, '·').toLowerCase();
      }

      function findMatchingNode(场所, 区域, 大陆) {
        // 优先精确匹配场所 → 区域 → 大陆
        const candidates = [场所, 区域, 大陆].filter(Boolean);
        for (const locName of candidates) {
          // 精确匹配 node.name
          const exact = nodes.find(n => n.name === locName);
          if (exact) return exact;
        }
        // 归一化匹配
        for (const locName of candidates) {
          if (!locName) continue;
          const norm = normalizeStr(locName);
          const match = nodes.find(n => normalizeStr(n.name) === norm);
          if (match) return match;
        }
        // 模糊匹配：node.name 包含位置名 或 位置名包含 node.name
        for (const locName of candidates) {
          if (!locName || locName.length < 2) continue;
          const norm = normalizeStr(locName);
          const fuzzy = nodes.find(n => {
            const nn = normalizeStr(n.name);
            return nn.includes(norm) || norm.includes(nn);
          });
          if (fuzzy) return fuzzy;
        }
        // 分段匹配：用 · 分割后逐段匹配
        for (const locName of candidates) {
          if (!locName) continue;
          const parts = locName.split(/[·・‧.\s]+/).filter(p => p.length >= 2);
          for (const part of parts) {
            const normPart = normalizeStr(part);
            const match = nodes.find(n => {
              const nn = normalizeStr(n.name);
              return nn.includes(normPart) || normPart.includes(nn);
            });
            if (match) return match;
          }
        }
        return null;
      }

      // 通过 postMessage 接收位置数据
      window.addEventListener('message', async (e) => {
        if (e.data && e.data.type === 'mvu_location' && e.data.位置) {
          _mvuLocation = e.data.位置;
          updatePlayerLocation();
          return;
        }
        if (e.data && (e.data.type === 'dragon_spawn_focus' || e.data.type === 'amber_spawn_focus') && e.data.spawn) {
          const spawn = e.data.spawn || {};
          const nextLayer = Number.isFinite(Number(spawn.地图层级)) ? Number(spawn.地图层级) : currentLayerIndex;
          if (nextLayer !== currentLayerIndex) {
            await switchLayer(nextLayer);
          }
          _mvuLocation = {
            大陆: spawn.大陆 || getLayerDisplayName(nextLayer),
            区域: spawn.区域 || spawn.层级 || '',
            场所: spawn.场所 || spawn.名称 || ''
          };
          updateSpawnSelectBanner(spawn.名称 || spawn.场所 || '');
          updatePlayerLocation();
        }
      });

      // 通知宿主本页已就绪：mvu 位置宿主（底部状态栏）用无 channel 版；
      // 出生点宿主（开局页）用带 channel 版，并带上当前模式。
      try {
        window.parent.postMessage({ type: 'map_ready' }, '*');
      } catch (e) { }
      try {
        window.parent.postMessage({
          channel: SPAWN_CHANNEL,
          type: 'map_ready',
          mode: MAP_MODE
        }, '*');
      } catch (e) { }

      // 在 minimap 中也绘制玩家位置
      const _origRenderMinimap = renderMinimap;
      renderMinimap = function () {
        _origRenderMinimap();
        if (!lastMatchedNodeId) return;
        const node = nodeMap[lastMatchedNodeId];
        if (!node) return;
        // 复用 minimap 坐标系
        const dpr = devicePixelRatio;
        const mw = 168 * dpr, mh = 128 * dpr;
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        nodes.forEach(n => {
          const wx = n.x * SPREAD, wy = n.y * SPREAD;
          if (wx < minX) minX = wx; if (wx > maxX) maxX = wx;
          if (wy < minY) minY = wy; if (wy > maxY) maxY = wy;
        });
        const pad = 100;
        minX -= pad; maxX += pad; minY -= pad; maxY += pad;
        const rangeX = maxX - minX, rangeY = maxY - minY;
        const mScale = Math.min(mw / rangeX, mh / rangeY) * 0.9;
        const offX = (mw - rangeX * mScale) / 2;
        const offY = (mh - rangeY * mScale) / 2;
        const px = offX + (node.x * SPREAD - minX) * mScale;
        const py = offY + (node.y * SPREAD - minY) * mScale;
        // 绘制绿色玩家点
        minimapCtx.fillStyle = '#00dc82';
        minimapCtx.beginPath();
        minimapCtx.arc(px, py, 4 * dpr, 0, Math.PI * 2);
        minimapCtx.fill();
        minimapCtx.strokeStyle = 'rgba(0,220,130,0.5)';
        minimapCtx.lineWidth = 1.5 * dpr;
        minimapCtx.beginPath();
        minimapCtx.arc(px, py, 6 * dpr, 0, Math.PI * 2);
        minimapCtx.stroke();
      };

      // ============ INIT ============
      createNodeElements();
      buildLegend();
      resizeCanvas();
    })(); // end async init
  </script>
</body>
