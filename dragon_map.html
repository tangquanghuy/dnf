<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龙族跑团 · 世界地图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./dragon_mapdata.js?v=airp20260711_2"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
    }

    body {
      background:
        radial-gradient(80% 60% at 42% 42%, rgba(46, 138, 214, 0.07) 0%, transparent 55%),
        radial-gradient(55% 45% at 74% 44%, rgba(124, 92, 208, 0.06) 0%, transparent 55%),
        radial-gradient(50% 40% at 16% 34%, rgba(24, 158, 144, 0.06) 0%, transparent 55%),
        radial-gradient(120% 100% at 50% 0%, #ffffff 0%, #eef2f7 48%, #e2e8f0 100%);
      color: #1e2a3c;
    }

    /* Faint topographic contour lines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.6;
      background-image:
        radial-gradient(closest-side at 42% 44%, transparent 0 30%, rgba(90, 120, 160, 0.05) 31% 32%, transparent 33%),
        radial-gradient(closest-side at 42% 44%, transparent 0 45%, rgba(90, 120, 160, 0.04) 46% 47%, transparent 48%),
        radial-gradient(closest-side at 74% 46%, transparent 0 30%, rgba(90, 120, 160, 0.045) 31% 32%, transparent 33%),
        linear-gradient(rgba(90, 115, 150, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(90, 115, 150, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(80, 105, 145, 0.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80, 105, 145, 0.09) 1px, transparent 1px);
      background-size:
        auto, auto, auto,
        34px 34px, 34px 34px,
        170px 170px, 170px 170px;
    }

    /* Soft inner-shadow frame */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      box-shadow: inset 0 0 160px rgba(70, 95, 135, 0.16);
    }

    #map-container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
      overflow: hidden;
      cursor: grab;
    }

    #map-container.grabbing {
      cursor: grabbing;
    }

    #edge-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #node-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .node-wrapper {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: auto;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: filter 0.2s;
    }

    .node-wrapper:hover {
      filter: brightness(1.05) drop-shadow(0 4px 10px rgba(40, 70, 110, 0.28));
    }

    .node-icon svg {
      display: block;
      filter: drop-shadow(0 2px 4px rgba(40, 65, 100, 0.28));
    }

    /* ============ FLAT ICON DISCS (light-modern) ============ */
    .node-icon {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--nc, #6b7d94);
      background: #fff;
      border: 2px solid var(--nc, #6b7d94);
      box-shadow: 0 3px 9px -2px rgba(40, 65, 100, 0.28), inset 0 0 0 3px rgba(255, 255, 255, 0.9);
    }

    /* major (city/campus/stronghold): solid colored disc, white glyph */
    .node-wrapper[data-tier="major"] .node-icon {
      color: #fff;
      background: var(--nc, #2f7fd6);
      border-color: #fff;
      box-shadow: 0 5px 14px -3px var(--nc, #2f7fd6), 0 0 0 1px rgba(255, 255, 255, 0.6);
    }

    .node-wrapper[data-tier="major"] .node-icon::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1.5px solid var(--nc, #2f7fd6);
      opacity: 0.32;
    }

    /* scene: tiny colored dot (icon glyph hidden) */
    .node-wrapper[data-type="scene"] .node-icon {
      border: 2px solid #fff;
      background: var(--nc, #6b7d94);
      box-shadow: 0 1px 4px -1px rgba(40, 65, 100, 0.5);
    }

    .node-wrapper[data-type="scene"] .node-icon svg {
      display: none;
    }

    /* otherspace: keep the original ornate colored icon, no white disc */
    .node-wrapper[data-type="otherspace"] .node-icon {
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .node-wrapper[data-type="otherspace"] .node-icon svg {
      filter: drop-shadow(0 2px 5px rgba(80, 30, 110, 0.4));
    }

    .node-label {
      position: relative;
      z-index: 3;
      margin-top: 6px;
      white-space: nowrap;
      text-align: center;
      color: #1e2a3c;
      font-weight: 600;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      line-height: 1.3;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(110, 132, 165, 0.28);
      padding: 2px 9px;
      border-radius: 7px;
      box-shadow: 0 2px 6px -2px rgba(40, 65, 100, 0.22);
      backdrop-filter: blur(3px);
    }

    /* City/Campus/Stronghold emphasis */
    .node-wrapper[data-tier="major"] .node-icon svg {
      filter: drop-shadow(0 3px 6px rgba(40, 65, 100, 0.32));
    }

    .node-wrapper[data-tier="major"] .node-label {
      color: #14203a;
      font-weight: 700;
    }

    /* ============ DETAIL MODAL STYLES ============ */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(60, 85, 120, 0.28);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
    }

    .detail-overlay.active {
      display: flex;
    }

    .detail-panel {
      position: relative;
      width: 90%;
      max-width: 680px;
      max-height: 85vh;
      background: linear-gradient(165deg, #ffffff 0%, #f5f8fb 100%);
      border: 1px solid rgba(120, 145, 180, 0.3);
      border-radius: 16px;
      overflow-y: auto;
      padding: 0;
      box-shadow: 0 24px 60px -12px rgba(30, 55, 90, 0.4);
    }

    .detail-panel::-webkit-scrollbar {
      width: 7px;
    }

    .detail-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .detail-panel::-webkit-scrollbar-thumb {
      background: rgba(120, 145, 180, 0.4);
      border-radius: 4px;
    }

    .detail-close {
      position: sticky;
      top: 14px;
      right: 0;
      z-index: 10;
      float: right;
      margin: 14px 14px 0 0;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(120, 145, 180, 0.3);
      background: #fff;
      color: #5a6b82;
      font-size: 20px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .detail-close:hover {
      background: #f0f3f7;
      color: #22324a;
    }

    .detail-header {
      padding: 28px 30px 18px;
      border-bottom: 1px solid rgba(120, 145, 180, 0.18);
    }

    .detail-title {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #1f2f45;
      margin-bottom: 12px;
      line-height: 1.25;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .detail-title svg {
      flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(40, 65, 100, 0.25));
    }

    .detail-type-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(47, 127, 214, 0.1);
      color: #2f6bb0;
      border: 1px solid rgba(47, 127, 214, 0.25);
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .detail-summary {
      padding: 18px 30px;
      color: #46586f;
      font-size: 14.5px;
      line-height: 1.85;
      white-space: pre-line;
      border-bottom: 1px solid rgba(120, 145, 180, 0.14);
    }

    .detail-body {
      padding: 10px 30px 30px;
    }

    .detail-section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(120, 145, 180, 0.12);
    }

    .detail-section:first-child {
      margin-top: 8px;
      border-top: none;
      padding-top: 0;
    }

    .detail-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #2f4059;
      margin-bottom: 9px;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .detail-section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 15px;
      background: linear-gradient(180deg, #2f7fd6, #1d5aa0);
      border-radius: 2px;
    }

    .detail-section-content {
      color: #55677e;
      font-size: 13.5px;
      line-height: 1.75;
      white-space: pre-line;
    }

    .detail-kv-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .detail-kv-row {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 8px;
      align-items: start;
    }

    .detail-kv-key {
      color: #2f4059;
      font-weight: 700;
      white-space: nowrap;
    }

    .detail-kv-value {
      color: #55677e;
      min-width: 0;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .detail-grid-item {
      background: rgba(90, 120, 160, 0.05);
      border: 1px solid rgba(120, 145, 180, 0.16);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .detail-grid-item .grid-label {
      font-size: 11px;
      color: #7186a0;
      margin-bottom: 3px;
    }

    .detail-grid-item .grid-value {
      font-size: 12px;
      color: #3c4c62;
      line-height: 1.5;
      white-space: pre-line;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .detail-tag {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(90, 120, 160, 0.08);
      color: #46586f;
      border: 1px solid rgba(120, 145, 180, 0.2);
      line-height: 1.4;
    }

    .detail-connections {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(120, 145, 180, 0.12);
    }

    .detail-conn-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      margin: 3px 5px 3px 0;
      border-radius: 999px;
      font-size: 12.5px;
      background: #eef3f9;
      color: #3a6d99;
      border: 1px solid #d3e0ee;
      cursor: pointer;
      transition: all 0.15s;
    }

    .detail-conn-item:hover {
      background: #e2ecf7;
      transform: translateY(-1px);
    }

    .detail-conn-dist {
      font-size: 10px;
      color: #7590ac;
      margin-left: 2px;
    }

    /* ============ EDIT MODE STYLES ============ */
    .edit-toolbar {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 60;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .edit-btn {
      padding: 7px 15px;
      border-radius: 9px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 600;
      border: 1px solid rgba(120, 145, 180, 0.3);
      background: rgba(255, 255, 255, 0.9);
      color: #33465e;
      transition: all 0.2s;
      backdrop-filter: blur(6px);
      box-shadow: 0 3px 10px -3px rgba(50, 80, 120, 0.28);
    }

    .edit-btn:hover {
      background: #fff;
    }

    .edit-btn.active {
      background: rgba(201, 137, 31, 0.16);
      border-color: rgba(201, 137, 31, 0.55);
      color: #a8690f;
    }

    .edit-btn.danger.active {
      background: rgba(217, 70, 61, 0.14);
      border-color: rgba(217, 70, 61, 0.55);
      color: #c0342a;
    }

    .edit-btn.add.active {
      background: rgba(47, 158, 92, 0.14);
      border-color: rgba(47, 158, 92, 0.55);
      color: #1f8050;
    }

    .edit-hint {
      font-size: 11px;
      color: #6a7a90;
      margin-left: 8px;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
    }

    .node-wrapper.editing {
      cursor: move;
    }

    .node-wrapper.editing:hover {
      filter: brightness(1.05) drop-shadow(0 0 12px rgba(201, 137, 31, 0.55));
    }

    .node-wrapper.edge-source .node-icon {
      box-shadow: 0 0 0 3px rgba(47, 158, 92, 0.5), 0 3px 10px -2px rgba(47, 158, 92, 0.6);
    }

    .node-wrapper.edge-source .node-label {
      border: 1px solid rgba(47, 158, 92, 0.75);
      box-shadow: 0 0 14px rgba(47, 158, 92, 0.3);
    }

    /* ============ SPECIAL MARKER STYLES ============ */
    /* 独立异空间标记 */
    .special-marker-layer2 {
      position: absolute;
      pointer-events: none;
      z-index: -1;
    }

    .special-marker-layer2::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 90px;
      height: 90px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80, 160, 255, 0.35) 0%, rgba(80, 160, 255, 0.08) 50%, transparent 70%);
      animation: pulse-layer2 2.5s ease-in-out infinite;
    }

    .special-marker-layer2::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 110px;
      height: 110px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px dashed rgba(80, 160, 255, 0.5);
      animation: spin-marker 12s linear infinite;
    }

    @keyframes pulse-layer2 {

      0%,
      100% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.15);
      }
    }

    @keyframes spin-marker {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    .special-badge-layer2 {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-weight: 700;
      color: #1f7fb8;
      background: rgba(255, 255, 255, 0.94);
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(47, 127, 214, 0.45);
      letter-spacing: 1px;
      pointer-events: none;
      animation: badge-glow-layer2 2s ease-in-out infinite alternate;
    }

    @keyframes badge-glow-layer2 {
      0% {
        box-shadow: 0 2px 6px -2px rgba(47, 127, 214, 0.3);
      }

      100% {
        box-shadow: 0 2px 12px -1px rgba(47, 127, 214, 0.55);
      }
    }

    /* 通往第三层入口标记 */
    .special-marker-layer3 {
      position: absolute;
      pointer-events: none;
      z-index: -1;
    }

    .special-marker-layer3::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 95px;
      height: 95px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, rgba(168, 85, 247, 0.1) 50%, transparent 70%);
      animation: pulse-layer3 2.8s ease-in-out infinite;
    }

    .special-marker-layer3::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 115px;
      height: 115px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px dashed rgba(168, 85, 247, 0.5);
      animation: spin-marker-layer3 14s linear infinite;
    }

    @keyframes pulse-layer3 {

      0%,
      100% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.15);
      }
    }

    @keyframes spin-marker-layer3 {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    .special-badge-layer3 {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-weight: 700;
      color: #9a2fbf;
      background: rgba(255, 255, 255, 0.94);
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(178, 63, 206, 0.45);
      letter-spacing: 1px;
      pointer-events: none;
      animation: badge-glow-layer3 2s ease-in-out infinite alternate;
    }

    @keyframes badge-glow-layer3 {
      0% {
        box-shadow: 0 2px 6px -2px rgba(178, 63, 206, 0.3);
      }

      100% {
        box-shadow: 0 2px 12px -1px rgba(178, 63, 206, 0.55);
      }
    }

    /* 中国沿海异常点标记 */
    .special-marker-worldscar {
      position: absolute;
      pointer-events: none;
      z-index: -1;
    }

    .special-marker-worldscar::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100px;
      height: 100px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 170, 50, 0.4) 0%, rgba(255, 140, 30, 0.1) 50%, transparent 70%);
      animation: pulse-worldscar 3s ease-in-out infinite;
    }

    .special-marker-worldscar::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255, 170, 50, 0.4);
      border-radius: 50%;
      animation: ring-worldscar 3s ease-in-out infinite;
    }

    @keyframes pulse-worldscar {

      0%,
      100% {
        opacity: 0.5;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
    }

    @keyframes ring-worldscar {

      0%,
      100% {
        opacity: 0.3;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    .special-badge-worldscar {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-weight: 700;
      color: #c0632a;
      background: rgba(255, 255, 255, 0.94);
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(221, 122, 43, 0.5);
      letter-spacing: 1px;
      pointer-events: none;
      animation: badge-glow-worldscar 2s ease-in-out infinite alternate;
    }

    @keyframes badge-glow-worldscar {
      0% {
        box-shadow: 0 2px 6px -2px rgba(221, 122, 43, 0.3);
      }

      100% {
        box-shadow: 0 2px 12px -1px rgba(221, 122, 43, 0.6);
      }
    }

    .edge-delete-hit {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      z-index: 3;
    }

    /* ============ RECOMMENDED SPAWN MARKER ============ */
    .special-marker-recommended { position:absolute; pointer-events:none; z-index:0; }
    .special-marker-recommended::before {
      content:''; position:absolute; top:50%; left:50%; width:92px; height:92px;
      transform:translate(-50%,-50%); border-radius:50%;
      background:radial-gradient(circle,rgba(134,239,172,.52) 0%,rgba(187,247,208,.24) 48%,transparent 74%);
      animation:pulse-recommended 2.4s ease-in-out infinite;
    }
    .special-marker-recommended::after {
      content:''; position:absolute; top:50%; left:50%; width:114px; height:114px;
      transform:translate(-50%,-50%); border-radius:50%; border:2px solid rgba(34,197,94,.54);
      animation:ring-recommended 2.4s ease-in-out infinite;
    }
    @keyframes pulse-recommended {
      0%,100% { opacity:.48; transform:translate(-50%,-50%) scale(.94); }
      50% { opacity:1; transform:translate(-50%,-50%) scale(1.14); }
    }
    @keyframes ring-recommended {
      0%,100% { opacity:.28; transform:translate(-50%,-50%) scale(.94); }
      50% { opacity:.72; transform:translate(-50%,-50%) scale(1.08); }
    }
    .special-badge-recommended {
      position:absolute; top:-24px; left:50%; transform:translateX(-50%);
      z-index:8; white-space:nowrap; font-size:11px; font-weight:800; color:#167a43;
      background:rgba(240,253,244,.98); padding:4px 10px; border-radius:999px;
      border:1px solid rgba(34,197,94,.62); letter-spacing:.5px; pointer-events:none;
      box-shadow:0 6px 16px -6px rgba(22,122,67,.46);
      animation:badge-glow-recommended 2.4s ease-in-out infinite;
    }
    @keyframes badge-glow-recommended {
      0%,100% { box-shadow:0 3px 10px rgba(74,222,128,.16); }
      50% { box-shadow:0 3px 18px rgba(74,222,128,.42); }
    }
    /* ============ PLAYER LOCATION MARKER ============ */
    /* 玩家当前位置标记 - 与入口标记同结构 */
    .special-marker-player {
      position: absolute;
      pointer-events: none;
      z-index: -1;
    }

    .special-marker-player::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 90px;
      height: 90px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 220, 130, 0.4) 0%, rgba(0, 220, 130, 0.1) 50%, transparent 70%);
      animation: pulse-player 2.5s ease-in-out infinite;
    }

    .special-marker-player::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 110px;
      height: 110px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(0, 220, 130, 0.5);
      animation: ring-player 3s ease-in-out infinite;
    }

    @keyframes pulse-player {

      0%,
      100% {
        opacity: 0.5;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
    }

    @keyframes ring-player {

      0%,
      100% {
        opacity: 0.3;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    .special-badge-player {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-weight: 700;
      color: #0f9d68;
      background: rgba(255, 255, 255, 0.95);
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(20, 170, 110, 0.55);
      letter-spacing: 1px;
      pointer-events: none;
      animation: badge-glow-player 2s ease-in-out infinite alternate;
    }

    @keyframes badge-glow-player {
      0% {
        box-shadow: 0 2px 6px -2px rgba(20, 170, 110, 0.35);
      }

      100% {
        box-shadow: 0 2px 12px -1px rgba(20, 170, 110, 0.6);
      }
    }

  </style>
</head>

  <!-- ============ DATA ============ -->


  <script>
    // ============ DATA CONFIG ============
    const pageParams = new URLSearchParams(window.location.search);
    const EMBED_BOOTSTRAP_CONFIG = window.__AMBER_MAP_EMBED_CONFIG__ || {};
    const embedMode = String(EMBED_BOOTSTRAP_CONFIG.mode || '').trim();
    const embedFlag = String(EMBED_BOOTSTRAP_CONFIG.embed || '').trim().toLowerCase();
    const MAP_MODE = pageParams.get('mode') || embedMode || 'browse';
    const IS_SPAWN_SELECT_MODE = MAP_MODE === 'spawn-select';
    const IS_EMBED_MODE = pageParams.get('embed') === '1' || embedFlag === '1' || embedFlag === 'true';

    // 与琥珀之剑、大明志异一致：由 head 中的同目录 script 直接提供 MAP_JSON_DATA。
    // 当开局页把远程 HTML 注入 srcdoc 时，注入的 <base href> 会让相对路径仍指向远程同目录。
    const LAYER_CONFIGS = [
      { cdnUrl: '', localVar: 'MAP_JSON_DATA', label: '地理总图' },
    ];

    let currentLayerIndex = 0;
    let layerDataCache = []; // 缓存已加载的层数据

    async function loadLayerData(layerIdx) {
      if (layerDataCache[layerIdx]) return layerDataCache[layerIdx];
      const cfg = LAYER_CONFIGS[layerIdx];
      // 1. 可选 CDN fetch（当前留空，与琥珀之剑实现保持一致）
      if (cfg.cdnUrl) {
        try {
          const resp = await fetch(cfg.cdnUrl);
          if (resp.ok) {
            const text = await resp.text();
            // JS 文件格式: var XXX = {...}; 提取 JSON 部分
            const match = text.match(/=\s*(\{[\s\S]*\})\s*;?\s*$/);
            if (match) {
              const json = JSON.parse(match[1]);
              if (json && json.mapData) { layerDataCache[layerIdx] = json; return json; }
            }
          }
        } catch (e) {
          console.warn(`CDN 加载层${layerIdx + 1}失败:`, e.message);
        }
      }
      // 2. 使用同目录 dragon_mapdata.js 已加载的全局变量
      const localData = window[cfg.localVar];
      if (localData && localData.mapData) { layerDataCache[layerIdx] = localData; return localData; }
      return null;
    }
    // 层级背景主题
    const LAYER_THEMES = [
      'radial-gradient(80% 60% at 42% 42%, rgba(46,138,214,0.07) 0%, transparent 55%), radial-gradient(55% 45% at 74% 44%, rgba(124,92,208,0.06) 0%, transparent 55%), radial-gradient(50% 40% at 16% 34%, rgba(24,158,144,0.06) 0%, transparent 55%), radial-gradient(120% 100% at 50% 0%, #ffffff 0%, #eef2f7 48%, #e2e8f0 100%)',
    ];

    (async function init() {
      const MAP_DATA = await loadLayerData(0);
      if (!MAP_DATA) {
        document.body.innerHTML = '<div style="color:#3c4c62;font-size:20px;text-align:center;margin-top:40vh;">数据加载失败：请确保 dragon_mapdata.js 与地图文件位于同一目录</div>';
        return;
      }

      let mapData = MAP_DATA.mapData;
      let nodes = mapData.nodes;
      let edges = mapData.edges || [];

      // ============ SET TITLE ============
      document.getElementById('map-title').textContent = mapData.title || '地理总图';

      // ============ TYPE CONFIG ============
      // ============ TYPE COLORS (light-modern semantic palette) ============

      const typeConfig = {

      // ============ FIELD LABELS (English key -> Chinese label) ============
      const FIELD_LABELS = {

        tier: '层级区域',
        nature: '地点性质',

        environmentFeatures: '环境特征',
        environmentalHazards: '环境危害',
        dangerLevel: '危险等级',
        ecology: '生态',
        danger: '危险',
        operation: '运营',
        militaryPower: '军事力量',
