                  <div class="merch-item-meta">
                    <span class="merch-item-badge" style="background:${color}15;color:${color}">${rpgEsc(quality)}</span>
                    ${type ? `<span class="merch-item-type">${rpgEsc(type.replace(/\[|\]/g, ''))}</span>` : ''}
                  </div>
                </div>
                <div class="merch-item-price" data-merch-price="${escapeHtmlAttr(String(rawPrice))}"><span>${rpgEsc(displayPrice)}</span><i class="fa-solid fa-coins"></i></div>
                ${hasDetails ? '<i class="fa-solid fa-chevron-down merch-item-chevron"></i>' : ''}
              </div>
              ${hasDetails ? `<div class="merch-item-details"><div class="merch-item-details-inner">${detailRows}<button class="merch-buy-btn"><i class="ra ra-gold-bar" style="margin-right:6px;font-size:13px"></i>购 入</button></div></div>` : `<div style="padding:0 14px 8px"><button class="merch-buy-btn"><i class="ra ra-gold-bar" style="margin-right:6px;font-size:13px"></i>购 入</button></div>`}
            </div>`;
          }).join('') + `</div>`;
        }

        pagesHtml += `<div id="merch-${idx}-cat-${cIdx}" class="merch-page ${cIdx === 0 ? 'active' : ''}">${itemsHtml}</div>`;
      });

      tabsHtml += `<button class="merch-tab tab-sell" onclick="switchMerch(event, '${idx}', 'sell')"><i class="fa-solid fa-scale-balanced mr-1"></i>出售物资</button>`;
      pagesHtml += `
        <div id="merch-${idx}-sell" class="merch-page">
            <div class="merch-sell-container">
               <div class="merch-sell-icon"><i class="ra ra-knapsack"></i></div>
               <p class="merch-sell-text">请在下方选择需要估价的物资或装备...</p>
            </div>
        </div>
      `;

      return `
      <div class="log-card card-merchant card-animate" style="animation-delay:${idx * 0.08}s">
        <div class="merch-header">
          <div class="merch-title-area">
            <span class="merch-title-line"></span>
            <i class="ra ra-shop merch-title-icon"></i>
            <span class="merch-title-text">${rpgEsc(storeTitle)}</span>
            <i class="ra ra-shop merch-title-icon" style="transform:scaleX(-1)"></i>
            <span class="merch-title-line"></span>
          </div>
          <div class="merch-tabs-container">
            ${tabsHtml}
          </div>
        </div>
        <div class="merch-body">
          ${pagesHtml}
        </div>
      </div>
      `;
    }

    // 全局切换页签方法
    window.switchMerch = function (e, idx, pageId) {
      const card = document.getElementById(`merch-${idx}-${pageId}`).closest('.card-merchant');
      card.querySelectorAll('.merch-tab').forEach(t => t.classList.remove('active'));
      card.querySelectorAll('.merch-page').forEach(p => p.classList.remove('active'));
      e.currentTarget.classList.add('active');
      document.getElementById(`merch-${idx}-${pageId}`).classList.add('active');
      if (String(pageId) === 'sell') {
        const state = merchantEnsureState(idx);
        if (!state.sellRendered || state.sellDirty) merchantRenderSellListByCard(card, idx);
      }
    }

    // 商品详情展开/收起（使用精确 scrollHeight 替代固定 max-height）
    window.toggleMerchItem = function (summaryEl) {
      const item = summaryEl.closest('.merch-item');
      const details = item.querySelector('.merch-item-details');
      if (!details) { item.classList.toggle('expanded'); return; }
      const isExpanded = item.classList.contains('expanded');
      if (isExpanded) {
        // 收起：先锁定当前高度，再过渡到0
        details.style.maxHeight = details.scrollHeight + 'px';
        requestAnimationFrame(() => {
          details.style.maxHeight = '0';
        });
        item.classList.remove('expanded');
      } else {
        // 展开：先确保从0开始，再设置精确目标高度
        details.style.maxHeight = '0';
        item.classList.add('expanded');
        requestAnimationFrame(() => {
          details.style.maxHeight = details.scrollHeight + 'px';
        });
        // 过渡结束后清理监听；保持数值高度可让后续收起过渡稳定
        const onEnd = () => {
          details.removeEventListener('transitionend', onEnd);
        };
        details.addEventListener('transitionend', onEnd);
      }
    }

    const merchantTradeState = {};
    let merchantTradeBound = false;

    function merchantDetectCardIdx(card, fallbackIdx) {
      const sellPage = card.querySelector('.merch-page[id$="-sell"]');
      if (sellPage && sellPage.id) {
        const m = sellPage.id.match(/^merch-(.+)-sell$/);
        if (m && m[1] !== undefined) return String(m[1]);
      }
      return String(fallbackIdx);
    }

    function merchantEnsureState(idx) {
      const k = String(idx);
      if (!merchantTradeState[k]) {
        merchantTradeState[k] = { buys: {}, sells: {}, stock: {}, uiCollapsed: true, sellTab: 'weapon', sellRendered: false, sellDirty: true };
      } else if (typeof merchantTradeState[k].uiCollapsed !== 'boolean') {
        merchantTradeState[k].uiCollapsed = true;
      }
      if (typeof merchantTradeState[k].sellTab !== 'string' || merchantTradeState[k].sellTab.trim() === '') {
        merchantTradeState[k].sellTab = 'weapon';
      }
      if (typeof merchantTradeState[k].sellRendered !== 'boolean') merchantTradeState[k].sellRendered = false;
      if (typeof merchantTradeState[k].sellDirty !== 'boolean') merchantTradeState[k].sellDirty = true;
      return merchantTradeState[k];
    }

    function merchantIsSellPageActive(card, idx) {
      const sellPage = card.querySelector('#merch-' + idx + '-sell');
      return !!(sellPage && sellPage.classList.contains('active'));
    }

    function merchantGetEquipName(equip, fallbackIndex) {
      if (!equip || typeof equip !== 'object') return '装备' + String(fallbackIndex + 1);
      const candidates = ['名称', '名字', 'name', '装备名', '物品名'];
      for (let i = 0; i < candidates.length; i++) {
        const key = candidates[i];
        if (equip[key] !== undefined && equip[key] !== null && String(equip[key]).trim() !== '') {
          return String(equip[key]).trim();
        }
      }
      return '装备' + String(fallbackIndex + 1);
    }

    function merchantGetSellCategory(item) {
      if (!item || typeof item !== 'object') return 'hidden';
      if (item.__sellKind === '道具') {
        const t = String(item.类型 || '').trim();
        if (t.includes('消耗')) return 'item_consume';
        if (t.includes('材料')) return 'item_material';
        if (t.includes('杂')) return 'item_misc';
        return 'hidden';
      }
      const t = String(item.类型 || '').replace(/\[|\]/g, '').trim();
      if (t.includes('武器')) return 'weapon';
      if (t.includes('防具')) return 'armor';
      if (t.includes('首饰')) return 'accessory';
      return 'hidden';
    }

    function merchantExtractBuyName(itemEl) {
      const nameEl = itemEl ? itemEl.querySelector('.merch-item-name') : null;
      if (!nameEl) return '';
      const clone = nameEl.cloneNode(true);
      clone.querySelectorAll('span').forEach(function (el) { el.remove(); });
      return clone.textContent.trim();
    }

    function merchantExtractBuyPrice(itemEl) {
      const priceEl = itemEl ? itemEl.querySelector('.merch-item-price') : null;
      if (!priceEl) return 0;
      const rawPrice = priceEl.getAttribute('data-merch-price');
      if (rawPrice !== null && rawPrice !== '') return merchantParseNumber(rawPrice);
      return merchantParseNumber(priceEl.textContent);
    }

    function merchantExtractBuyTotalQty(itemEl) {
      if (!itemEl) return 1;
      const cached = parseInt(itemEl.getAttribute('data-merch-total-qty') || '', 10);
      if (Number.isFinite(cached) && cached > 0) return cached;
      const nameEl = itemEl.querySelector('.merch-item-name');
      const txt = nameEl ? (nameEl.textContent || '') : '';
      const m = txt.match(/x\s*(\d+)\s*$/i);
      const qty = m ? parseInt(m[1], 10) : 1;
      const safe = Number.isFinite(qty) && qty > 0 ? qty : 1;
      itemEl.setAttribute('data-merch-total-qty', String(safe));
      return safe;
    }

    function merchantSetupItemStocks(card, idx) {
      const state = merchantEnsureState(idx);
      const items = Array.from(card.querySelectorAll('.merch-item')).filter(function (itemEl) {
        return !!itemEl.querySelector('.merch-buy-btn');
      });
      items.forEach(function (itemEl, i) {
        let key = itemEl.getAttribute('data-merch-item-key');
        if (!key) {
          key = 'merch_' + String(idx) + '_' + String(i);
          itemEl.setAttribute('data-merch-item-key', key);
        }
        const totalQty = merchantExtractBuyTotalQty(itemEl);
        const name = merchantExtractBuyName(itemEl);
        const price = merchantExtractBuyPrice(itemEl);
        if (!state.stock[key]) {
          state.stock[key] = { key: key, name: name, price: price, total: totalQty, remaining: totalQty };
        } else {
          state.stock[key].name = name || state.stock[key].name;
          if (price > 0) state.stock[key].price = price;
          if (!Number.isFinite(state.stock[key].total) || state.stock[key].total <= 0) state.stock[key].total = totalQty;
          if (!Number.isFinite(state.stock[key].remaining)) state.stock[key].remaining = state.stock[key].total;
          if (state.stock[key].remaining > state.stock[key].total) state.stock[key].remaining = state.stock[key].total;
        }
      });
    }

    function merchantSyncStockUi(card, idx) {
      const state = merchantEnsureState(idx);
      merchantSetupItemStocks(card, idx);
      Object.keys(state.stock).forEach(function (key) {
        const st = state.stock[key];
        if (!st) return;
        const itemEl = card.querySelector('.merch-item[data-merch-item-key="' + key + '"]');
        if (!itemEl) return;

        const nameEl = itemEl.querySelector('.merch-item-name');
        let qtySpan = nameEl ? nameEl.querySelector('[data-stock-remain="1"]') : null;
        if (nameEl) {
          const allSpans = Array.from(nameEl.querySelectorAll('span'));
          if (!qtySpan && allSpans.length > 0) {
            qtySpan = allSpans[0];
            qtySpan.setAttribute('data-stock-remain', '1');
          }
          if (!qtySpan) {
            qtySpan = document.createElement('span');
            qtySpan.setAttribute('data-stock-remain', '1');
            qtySpan.style.color = 'var(--text-muted)';
            qtySpan.style.fontSize = '12px';
            qtySpan.style.marginLeft = '6px';
            nameEl.appendChild(qtySpan);
          }
          allSpans.forEach(function (sp) {
            if (sp !== qtySpan) sp.remove();
          });
        }
        if (qtySpan) {
          qtySpan.textContent = st.total > 1 ? ('x' + String(st.remaining)) : (st.remaining > 0 ? '' : '售罄');
        }

        const buyBtns = itemEl.querySelectorAll('.merch-buy-btn');
        buyBtns.forEach(function (btn) {
          if (!btn.dataset.originHtml) btn.dataset.originHtml = btn.innerHTML;
          if (st.remaining <= 0) {
            btn.disabled = true;
            btn.style.opacity = '0.55';
            btn.style.cursor = 'not-allowed';
            btn.innerHTML = '<i class="ra ra-cancel" style="margin-right:6px;font-size:13px"></i>售 罄';
          } else {
            btn.disabled = false;
            btn.style.opacity = '';
            btn.style.cursor = '';
            btn.innerHTML = btn.dataset.originHtml;
          }
        });
      });
    }

    function merchantGetBuyList(idx) {
      const state = merchantEnsureState(idx);
      return Object.keys(state.buys).map(function (k) { return state.buys[k]; }).filter(function (v) { return v && v.qty > 0; });
    }

    function merchantGetSellList(idx) {
      const state = merchantEnsureState(idx);
      return Object.keys(state.sells).map(function (k) { return state.sells[k]; }).filter(function (v) { return v && (v.qty || 0) > 0; });
    }

    function merchantGetBuyTotal(idx) {
      const buys = merchantGetBuyList(idx);
      let sum = 0;
      for (let i = 0; i < buys.length; i++) {
        sum += (buys[i].price || 0) * (buys[i].qty || 0);
      }
      return sum;
    }

    function merchantAddBuyItem(state, key, name, price, delta) {
      if (!key || !name) return false;
      const step = Number(delta || 0);
      if (!step) return false;
      const stock = state.stock[key];
      if (!stock) return false;

      if (!state.buys[key]) state.buys[key] = { key: key, name: name, price: price || stock.price || 0, qty: 0 };
      const entry = state.buys[key];

      if (step > 0) {
        if (stock.remaining < step) return false;
        entry.qty += step;
        stock.remaining -= step;
        if (price > 0) entry.price = price;
      } else {
        const back = Math.min(entry.qty, Math.abs(step));
        if (back <= 0) return false;
        entry.qty -= back;
        stock.remaining = Math.min(stock.total, stock.remaining + back);
      }

      if (entry.qty <= 0) delete state.buys[key];
      return true;
    }

    function merchantAddSellItem(state, key, name, delta, maxQty) {
      if (!key || !name) return false;
      const step = Number(delta || 0);
      const limit = Math.max(1, merchantParseNumber(maxQty || 1));
      if (!step) return false;

      if (!state.sells[key]) state.sells[key] = { key: key, name: name, qty: 0, max: limit };
      const entry = state.sells[key];
      entry.max = Math.max(merchantParseNumber(entry.max || 0), limit);

      if (step > 0) {
        if ((entry.qty || 0) >= entry.max) return false;
        entry.qty = Math.min(entry.max, (entry.qty || 0) + step);
      } else {
        const back = Math.min(entry.qty || 0, Math.abs(step));
        if (back <= 0) return false;
        entry.qty = (entry.qty || 0) - back;
      }

      if ((entry.qty || 0) <= 0) delete state.sells[key];
      return true;
    }

    function merchantCreateTagBtn(cls, text, action, idx, attrs) {
      const btn = document.createElement('button');
      btn.className = cls;
      btn.setAttribute('type', 'button');
      btn.setAttribute('data-merchant-action', action);
      btn.setAttribute('data-merch-idx', String(idx));
      btn.textContent = text;
      if (attrs && typeof attrs === 'object') {
        Object.keys(attrs).forEach(function (k) {
          btn.setAttribute(k, attrs[k]);
        });
      }
      return btn;
    }

    function merchantComposeCheckoutText(idx) {
      const buys = merchantGetBuyList(idx);
      const sells = merchantGetSellList(idx);
      if (buys.length === 0 && sells.length === 0) return '';
      const buyText = buys.length > 0 ? buys.map(function (it) { return it.name + 'x' + it.qty; }).join('+') : '无';
      const sellText = sells.length > 0 ? sells.map(function (it) { return it.name + 'x' + (it.qty || 1); }).join('+') : '无';
      const total = merchantGetBuyTotal(idx);
      return '买入' + buyText + '，共计花费' + String(total) + '金币。并卖出' + sellText + '。请对卖出物品估价。';
    }

    function merchantRenderSellListByCard(card, idx) {

            const key = equip.__sellKey || ('sell_' + String(i) + '_' + name);
            const totalQty = Math.max(1, merchantParseNumber(equip.数量 || 1));
            if (state.sells[key]) {
              state.sells[key].name = name;
              state.sells[key].max = totalQty;
            }
            const sellQty = state.sells[key] ? (state.sells[key].qty || 0) : 0;

            const selected = sellQty > 0;

            itemEl.className = 'merch-item' + (selected ? ' selected-sell' : '');

            summaryEl.className = 'merch-item-summary';

            const infoEl = document.createElement('div');
            infoEl.className = 'merch-item-info';

            const titleEl = document.createElement('div');
            titleEl.className = 'merch-item-name';
            titleEl.style.color = color;
            titleEl.title = name;
            titleEl.textContent = name;
            if (totalQty > 1) {
              const qtyEl = document.createElement('span');
              qtyEl.style.color = 'var(--text-muted)';
              qtyEl.style.fontSize = '12px';
              qtyEl.style.marginLeft = '6px';
              qtyEl.textContent = 'x' + String(remainingQty);
              titleEl.appendChild(qtyEl);

            qualityEl.className = 'merch-item-badge';
            qualityEl.style.background = color + '15';
            qualityEl.style.color = color;
            qualityEl.textContent = quality;

            typeEl.className = 'merch-item-type';
            typeEl.textContent = typeText;

            const kindEl = document.createElement('span');
            kindEl.className = 'merch-item-tag';
            kindEl.textContent = String(equip.__sellKind || '物资');

            metaEl.appendChild(qualityEl);
            metaEl.appendChild(typeEl);
            metaEl.appendChild(kindEl);
            if (sellQty > 0) {
              const selectedEl = document.createElement('span');
              selectedEl.className = 'merch-item-tag';
              selectedEl.textContent = '已加入 x' + String(sellQty);
              metaEl.appendChild(selectedEl);
            }
            if (equip.等级 !== undefined && equip.等级 !== null && String(equip.等级).trim() !== '') {
              const lvEl = document.createElement('span');
              lvEl.className = 'merch-item-tag';
              lvEl.textContent = 'Lv.' + String(equip.等级);
              metaEl.appendChild(lvEl);
            }

            infoEl.appendChild(titleEl);
            infoEl.appendChild(metaEl);

            const btn = document.createElement('button');
            btn.className = 'merch-sell-toggle' + (selected ? ' active' : '');
            btn.textContent = remainingQty > 0 ? '卖出 +1' : '售罄';
            btn.setAttribute('type', 'button');
            btn.setAttribute('data-merchant-action', 'sell-add');
            btn.setAttribute('data-merch-idx', String(idx));
            btn.setAttribute('data-sell-key', key);
            btn.setAttribute('data-sell-name', name);
            btn.setAttribute('data-sell-max', String(totalQty));
            if (remainingQty <= 0) btn.disabled = true;

            summaryEl.appendChild(infoEl);
            summaryEl.appendChild(btn);
            itemEl.appendChild(summaryEl);
            itemsWrap.appendChild(itemEl);
          }
        }
        listHost.appendChild(itemsWrap);
      }

    }

    function merchantNotify(message) {
      if (typeof showSettingsMessage === 'function') showSettingsMessage(message);
    }

    function merchantRefreshSellUi(card, idx, state) {
      if (merchantIsSellPageActive(card, idx)) merchantRenderSellListByCard(card, idx);
      else state.sellDirty = true;
    }

    function merchantResetTradeState(card, idx, state) {
      Object.keys(state.buys).forEach(function (k) {
        const entry = state.buys[k];
        if (!entry) return;
        merchantAddBuyItem(state, entry.key, entry.name, entry.price || 0, -(entry.qty || 0));
      });
      state.buys = {};
      state.sells = {};
      merchantRefreshSellUi(card, idx, state);
      merchantRenderCartByCard(card, idx);
    }

    function merchantHandleBuyAction(action, actionEl, card, idx, state) {
      if (action === 'buy') {
        const itemEl = actionEl.closest('.merch-item');
        const buyKey = itemEl ? (itemEl.getAttribute('data-merch-item-key') || '') : '';
        const name = merchantExtractBuyName(itemEl);
        const price = merchantExtractBuyPrice(itemEl);
        if (!buyKey || !name) return true;
        const ok = merchantAddBuyItem(state, buyKey, name, price, 1);
        if (!ok) {
          merchantNotify('库存不足或已售罄');
          merchantSyncStockUi(card, idx);
          return true;
        }
        merchantRenderCartByCard(card, idx);
        return true;
      }

      if (action !== 'buy-inc' && action !== 'buy-dec' && action !== 'buy-remove') return false;

      const buyKey = actionEl.getAttribute('data-buy-key') || '';
      const name = actionEl.getAttribute('data-buy-name') || '';
      if (!buyKey || !name) return true;

      if (action === 'buy-inc') {
        const price = merchantParseNumber(actionEl.getAttribute('data-buy-price') || '0');
        const ok = merchantAddBuyItem(state, buyKey, name, price, 1);
        if (!ok) merchantNotify('库存不足或已售罄');
      } else if (action === 'buy-dec') {
        if (!state.buys[buyKey]) return true;
        merchantAddBuyItem(state, buyKey, name, state.buys[buyKey].price || 0, -1);
      } else if (state.buys[buyKey]) {
        const qty = state.buys[buyKey].qty || 0;
        if (qty > 0) merchantAddBuyItem(state, buyKey, name, state.buys[buyKey].price || 0, -qty);
      }

      merchantRenderCartByCard(card, idx);
      return true;
    }

    function merchantHandleSellAction(action, actionEl, card, idx, state) {
      if (action === 'sell-tab') {
        state.sellTab = actionEl.getAttribute('data-sell-tab') || 'weapon';
        merchantRenderSellListByCard(card, idx);
        return true;
      }

      const isSellMutation = action === 'sell-add' || action === 'toggle-sell' || action === 'sell-inc' || action === 'sell-dec' || action === 'sell-remove';
      if (!isSellMutation) return false;

      const key = actionEl.getAttribute('data-sell-key') || '';
      const name = actionEl.getAttribute('data-sell-name') || key || '未命名物资';
      if (!key || !name) return true;

      let delta = 0;
      let maxQty = 1;
      const forceFullRender = action === 'sell-add' || action === 'toggle-sell';

      if (action === 'sell-add' || action === 'sell-inc') {
        delta = 1;
        maxQty = merchantParseNumber(actionEl.getAttribute('data-sell-max') || '1');
      } else if (action === 'toggle-sell') {
        delta = 1;
        maxQty = state.sells[key] ? (state.sells[key].max || 1) : 1;
      } else if (action === 'sell-dec') {
        if (!state.sells[key]) return true;
        delta = -1;
        maxQty = state.sells[key].max || 1;
      } else {
        if (!state.sells[key]) return true;
        delta = -(state.sells[key].qty || 0);
        maxQty = state.sells[key].max || 1;
      }

      const ok = merchantAddSellItem(state, key, name, delta, maxQty);
      if (!ok && delta > 0) merchantNotify('库存不足或已售罄');

      if (forceFullRender) merchantRenderSellListByCard(card, idx);
      else merchantRefreshSellUi(card, idx, state);
      merchantRenderCartByCard(card, idx);
      return true;
    }

    function initMerchantTradeUi() {
      const cards = Array.from(document.querySelectorAll('.card-merchant'));
      if (cards.length === 0) return;
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        const idx = merchantDetectCardIdx(card, i);
        card.setAttribute('data-merch-idx', idx);
        merchantSetupItemStocks(card, idx);
        const buyBtns = card.querySelectorAll('.merch-buy-btn');
        buyBtns.forEach(function (btn) {
          btn.setAttribute('type', 'button');
          btn.setAttribute('data-merchant-action', 'buy');
          btn.setAttribute('data-merch-idx', idx);
        });
        merchantSyncStockUi(card, idx);
        merchantRenderCartByCard(card, idx);
      }

      if (!merchantTradeBound) {
        document.addEventListener('click', function (ev) {
          const actionEl = ev.target.closest('[data-merchant-action]');
          if (!actionEl) return;
          const action = actionEl.getAttribute('data-merchant-action');
          const card = actionEl.closest('.card-merchant');
          if (!card) return;
          const idx = actionEl.getAttribute('data-merch-idx') || card.getAttribute('data-merch-idx') || '0';
          const state = merchantEnsureState(idx);

          if (action === 'toggle-cart') {
            ev.preventDefault();
            state.uiCollapsed = !state.uiCollapsed;
            merchantRenderCartByCard(card, idx);
            return;
          }

          if (action === 'buy' || action === 'buy-inc' || action === 'buy-dec' || action === 'buy-remove') {
            ev.preventDefault();
            ev.stopPropagation();
            merchantHandleBuyAction(action, actionEl, card, idx, state);
            return;
          }

          if (action === 'sell-tab' || action === 'sell-add' || action === 'toggle-sell' || action === 'sell-inc' || action === 'sell-dec' || action === 'sell-remove') {
            ev.preventDefault();
            merchantHandleSellAction(action, actionEl, card, idx, state);
            return;
          }

          if (action === 'clear-cart') {
            ev.preventDefault();
            merchantResetTradeState(card, idx, state);
            return;
          }

          if (action === 'checkout') {
            ev.preventDefault();
            const text = merchantComposeCheckoutText(idx);
            if (!text) {
              merchantNotify('请先选择买入或卖出项');
              return;
            }
            const ok = merchantSendMessageToChat(text);
            if (!ok) {
              merchantNotify('发送失败：未找到聊天输入框');
              return;
            }
            merchantResetTradeState(card, idx, state);
            merchantNotify('已发送结算语句');
          }
        });
        merchantTradeBound = true;
      }
    }

    // ===== RPG LOG 总调度 =====
    function renderRpgCard(type, raw, idx) {
      const t = String(type || '').toLowerCase();
      const rendererMap = {
        dicecombat: renderRpgDiceCombat,
        dicecheck: renderRpgDiceCheck,
        enemyoverview: renderRpgEnemyOverview,
        summonoverview: renderRpgSummonOverview,
        lootlog: renderRpgLootLog,
        experiencelog: renderRpgExperienceLog,
        questcontract: renderRpgQuestContract,
        merchantstore: renderRpgMerchantStore
      };
      const renderer = rendererMap[t];
      return typeof renderer === 'function' ? renderer(raw, idx) : '';
    }

    function processTextContent() {
      const contentDiv = document.getElementById('readingContent');
      if (!contentDiv) return;

      const initialHtml = contentDiv.innerHTML.trim();
      if (!initialHtml) return;

      const workDiv = document.createElement('div');
      workDiv.innerHTML = initialHtml;
      contentDiv.setAttribute('aria-busy', 'true');

      // === Phase 1: DOM操作 - 提取HTML块(style+div / 顶层自定义HTML卡片)，保留原始DOM元素 ===
      const preservedBlocks = [];
      let preservedBlockIndex = 0;
      const standaloneHtmlBlockSelector = [
        ':scope > div[style]',
        ':scope > div[class]',
        ':scope > div[data-preserve-html]',
        ':scope > section[style]',
        ':scope > section[class]',
        ':scope > section[data-preserve-html]',
        ':scope > article[style]',
        ':scope > article[class]',
        ':scope > article[data-preserve-html]',
        ':scope > blockquote[style]',
        ':scope > blockquote[class]',
        ':scope > blockquote[data-preserve-html]',
        ':scope > figure[style]',
        ':scope > figure[class]',
        ':scope > figure[data-preserve-html]',
        ':scope > table[style]',
        ':scope > table[class]',
        ':scope > table[data-preserve-html]',
        ':scope > button',
        ':scope > a',
        ':scope > input',
        ':scope > textarea',
        ':scope > select'
      ].join(', ');
      const styleEls = Array.from(workDiv.querySelectorAll(':scope > style'));
      for (let si = 0; si < styleEls.length; si++) {
        const styleEl = styleEls[si];
        const scopeId = 'shb-' + Math.random().toString(36).substr(2, 6);
        styleEl.textContent = scopeCssSelectors(styleEl.textContent, scopeId);
        // 找到紧跟的div兄弟元素
        let nextEl = styleEl.nextSibling;
        while (nextEl && ((nextEl.nodeType === 3 && !nextEl.textContent.trim()) ||
          (nextEl.nodeType === 1 && nextEl.tagName === 'BR'))) {
          nextEl = nextEl.nextSibling;
        }
        const wrapper = document.createElement('div');
        wrapper.id = scopeId;
        wrapper.className = 'scoped-html-block';
        // 插入占位符文本
        const ph = '\n___HTMLBLOCK_' + (preservedBlockIndex++) + '___\n';
        workDiv.insertBefore(document.createTextNode(ph), styleEl);
        // 清理style和div之间的空白/BR
        let cur = styleEl.nextSibling;
        while (cur && cur !== nextEl) {
          const nx = cur.nextSibling;
          if ((cur.nodeType === 3 && !cur.textContent.trim()) || (cur.nodeType === 1 && cur.tagName === 'BR'))
            workDiv.removeChild(cur);
          cur = nx;
        }
        wrapper.appendChild(styleEl);
        if (nextEl && nextEl.nodeType === 1 && nextEl.tagName === 'DIV')
          wrapper.appendChild(nextEl);
        preservedBlocks.push({ ph: ph.trim(), wrapper: wrapper });
      }

      // 顶层自定义HTML块默认保留，避免在 processParagraphs 中被当作普通正文剥离标签。
      Array.from(workDiv.querySelectorAll(standaloneHtmlBlockSelector)).forEach(blockEl => {
        if (blockEl.parentNode !== workDiv) return;
        const ph = '\n___HTMLBLOCK_' + (preservedBlockIndex++) + '___\n';
        workDiv.insertBefore(document.createTextNode(ph), blockEl);
        workDiv.removeChild(blockEl);
        preservedBlocks.push({ ph: ph.trim(), wrapper: blockEl });
      });

      // 保护第三方生图按钮及其容器，避免被文本处理剥离/重包裹
      const pluginButtonSelector = [
        'button.image-tag-button',
        'button.st-chatu8-image-button',
        'button[data-image-tag]',
        'button[data-link][data-request-id]'
      ].join(', ');
      const pluginContainers = new Set();
      Array.from(workDiv.querySelectorAll(pluginButtonSelector)).forEach(btn => {
        if (!btn) return;
        const container = btn.closest('div, section, article, blockquote, figure, p, table, li') || btn;
        pluginContainers.add(container);
      });
      pluginContainers.forEach(container => {
        if (!container || !container.parentNode) return;
        const ph = '\n___HTMLBLOCK_' + (preservedBlockIndex++) + '___\n';
        container.parentNode.insertBefore(document.createTextNode(ph), container);
        container.parentNode.removeChild(container);
        preservedBlocks.push({ ph: ph.trim(), wrapper: container });
      });

      // === Phase 2: 读取innerHTML（HTML块已被替换为文本占位符）===
      let rawText = workDiv.innerHTML.trim();
      if (!rawText) {
        contentDiv.removeAttribute('aria-busy');
        return;
      }

      // 解码HTML实体，使转义标签（如 &lt;img&gt;）可被后续逻辑识别
      rawText = decodeHtmlEntities(rawText);

      // 标签匹配：图片标签 + RPG日志标签
      const tagPatterns = [
        { regex: /<Image>([\s\S]*?)<\/Image>/gi, type: 'image-tag' },
        { regex: /<pic>([\s\S]*?)<\/pic>/gi, type: 'image-tag' },
        { regex: /<img\b[^>]*>/gi, type: 'html-img' },
        { regex: /<(DiceCombat)>([\s\S]*?)<\/DiceCombat>/gi, type: 'rpg-log' },
        { regex: /<(DiceCheck)>([\s\S]*?)<\/DiceCheck>/gi, type: 'rpg-log' },
        { regex: /<(EnemyOverview)>([\s\S]*?)<\/EnemyOverview>/gi, type: 'rpg-log' },
        { regex: /<(SummonOverview)>([\s\S]*?)<\/SummonOverview>/gi, type: 'rpg-log' },
        { regex: /<(LootLog)>([\s\S]*?)<\/LootLog>/gi, type: 'rpg-log' },
        { regex: /<(ExperienceLog)>([\s\S]*?)<\/ExperienceLog>/gi, type: 'rpg-log' },
        { regex: /<(QuestContract)>([\s\S]*?)<\/QuestContract>/gi, type: 'rpg-log' },
        { regex: /<(MerchantStore)>([\s\S]*?)<\/MerchantStore>/gi, type: 'rpg-log' }
      ];
      const matches = [];
      let rpgIdx = 0;
      tagPatterns.forEach(config => {
        let match;
        config.regex.lastIndex = 0;
        while ((match = config.regex.exec(rawText)) !== null) {
          if (config.type === 'image-tag') {
            matches.push({ index: match.index, length: match[0].length, content: match[1].trim(), raw: match[0], type: 'image-tag' });
          } else if (config.type === 'html-img') {
            matches.push({ index: match.index, length: match[0].length, content: match[0], type: 'html-img' });
          } else {
            matches.push({ index: match.index, length: match[0].length, rpgType: match[1], content: match[2], type: 'rpg-log', rpgIdx: rpgIdx++ });
          }
        }
      });

      matches.sort((a, b) => a.index - b.index);
      // 去重：移除被更大匹配包含的重叠项
      for (let i = matches.length - 1; i > 0; i--) {
        const prev = matches[i - 1];
        if (matches[i].index < prev.index + prev.length) {
          if (matches[i].length > prev.length) matches.splice(i - 1, 1);
          else matches.splice(i, 1);
        }
      }

      // === Phase 2: 文本处理 - 只处理图片和RPG标签，占位符原样保留 ===
      const htmlParts = [];
      let lastIndex = 0;
      matches.forEach(match => {
        const beforeText = rawText.substring(lastIndex, match.index);
        if (beforeText.trim()) htmlParts.push(processParagraphs(beforeText));
        if (match.type === 'image-tag') {
          htmlParts.push(renderImageTag(match));
        } else if (match.type === 'html-img') {
          htmlParts.push(createInteractiveImageContainer(match.content));
        } else if (match.type === 'rpg-log') {
          htmlParts.push('<div class="rpg-log-section">' + renderRpgCard(match.rpgType, match.content, match.rpgIdx) + '</div>');
        }
        lastIndex = match.index + match.length;
      });
      const remainingText = rawText.substring(lastIndex);
      if (remainingText.trim()) htmlParts.push(processParagraphs(remainingText));
      workDiv.innerHTML = htmlParts.join('');

      // === Phase 3: 恢复保存的HTML块 - 将占位符替换为原始DOM元素 ===
      if (preservedBlocks.length > 0) {
        const walker = document.createTreeWalker(workDiv, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        let node;
        while ((node = walker.nextNode())) textNodes.push(node);
        for (const block of preservedBlocks) {
          for (const tn of textNodes) {
            if (tn.textContent.includes(block.ph)) {
              const parent = tn.parentNode;
              const trimmedContent = tn.textContent.replace(block.ph, '').trim();
              // 如果占位符独占一个<p>标签（内容只有占位符），替换整个<p>
              if (parent.tagName === 'P' && !trimmedContent) {
                parent.parentNode.insertBefore(block.wrapper, parent);
                parent.parentNode.removeChild(parent);
              } else {
                // 其他情况：在文本节点位置插入保存的DOM元素
                const parts = tn.textContent.split(block.ph);
                if (parts[0]) parent.insertBefore(document.createTextNode(parts[0]), tn);
                parent.insertBefore(block.wrapper, tn);
                if (parts[1]) parent.insertBefore(document.createTextNode(parts[1]), tn);
                parent.removeChild(tn);
              }
              break;
            }
          }
        }
      }

      // 为敌人卡片注入SVG图标
      workDiv.querySelectorAll('.monster-icon-frame[data-rank]').forEach(frame => {
        const svg = getRankSvg(frame.dataset.rank);
        if (svg) frame.innerHTML = svg;
      });

      // 过滤全文中的 ** 符号
      removeAsterisks(workDiv);
      contentDiv.replaceChildren(...Array.from(workDiv.childNodes));
      contentDiv.removeAttribute('aria-busy');
    }

    // 递归遍历文本节点，移除 ** 符号
    function removeAsterisks(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        node.textContent = node.textContent.replace(/\*\*/g, '');
      } else {
        node.childNodes.forEach(removeAsterisks);
      }
    }

    // 清理文本中的HTML注释
    function cleanHtmlComments(text) {
      return text.replace(new RegExp('<' + '!--[\\s\\S]*?--' + '>', 'g'), '');
    }

    // 解码常见HTML实体，支持一层嵌套编码（如 &amp;lt;img&amp;gt;）
    function decodeHtmlEntities(text) {
      if (!text || text.indexOf('&') === -1) return text;
      const ta = document.createElement('textarea');
      let decoded = text;
      for (let i = 0; i < 5; i++) {
        const prev = decoded;
        ta.innerHTML = decoded;
        decoded = ta.value;
        if (decoded === prev) break;
        if (decoded.indexOf('&') === -1) break;
      }
      return decoded;
    }

    // 对CSS选择器添加作用域前缀，防止样式泄露到外部
    function scopeCssSelectors(css, scopeId) {
      const prefix = '#' + scopeId;
      // 匹配 selector { body } 格式的CSS规则
      return css.replace(/([^{}]+)\{([^{}]*)\}/g, function (match, selector, body) {
        var scoped = selector.split(',').map(function (s) {
          s = s.trim();
          // 跳过@规则、关键帧步骤
          if (!s || s.charAt(0) === '@' || s === 'from' || s === 'to' || /^\d+%$/.test(s)) return s;
          return prefix + ' ' + s;
        }).join(', ');
        return scoped + '{' + body + '}';
      });
    }

    function processParagraphs(text) {
      // 清理HTML注释
      text = cleanHtmlComments(text);
      // 剥离残留的HTML标签（style块整体移除，其他标签只去标签保留文本）
      text = text.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '');
      text = text.replace(/<\/?(?:div|span|p|ul|ol|li|strong|em|b|i|h[1-6]|table|tr|td|th|thead|tbody|a|br|hr|blockquote|pre|code|section|article|header|footer|nav|main|aside|figure|figcaption)[^>]*>/gi, '');
      let cleanText = text.replace(/<\/?Image(?!\s)>/gi, '');

      // 清理每行中重复的角色名标记：保留行首的 {角色名}，移除后续的 {角色名}
      // 例如 "{艾玛}{艾玛}「对话」" 变成 "{艾玛}「对话」"
      cleanText = cleanText.split('\n').map(line => {
        // 匹配行首的角色标记
        const firstTagMatch = line.match(/^(\s*\{[^}]+\})/);
        if (firstTagMatch) {
          const firstTag = firstTagMatch[1];
          const rest = line.substring(firstTag.length);
          // 移除剩余部分中的所有角色名标记
          const cleanRest = rest.replace(/\{[^}]+\}/g, '');
          return firstTag + cleanRest;
        }
        return line;
      }).join('\n');

      const lines = cleanText.split(/\n+/).filter(p => p.trim().length > 0);

      let resultHtml = '';
      let pendingDialogue = null;

      const flushPending = () => {
        if (pendingDialogue) {
          const mergedText = pendingDialogue.texts.map(t => processDialogueContent(t)).join('<br><br>');
          resultHtml += createDialogueElement(pendingDialogue.name, mergedText, true);
          pendingDialogue = null;
        }
      };

      // 辅助函数：检查是否可以合并
      const checkCanMerge = (normalizedName) => {
        if (!pendingDialogue) return false;
        if (pendingDialogue.normalizedName === normalizedName) return true;
        const c1 = CHARACTER_CONFIG[pendingDialogue.normalizedName];
        const c2 = CHARACTER_CONFIG[normalizedName];
        if (c1 && c2 && c1.avatar && c2.avatar && c1.avatar === c2.avatar) return true;
        return false;
      };

      for (let line of lines) {
        line = line.trim();

        // 跳过双花括号格式 {{...}}，这是情绪/动作描述，不作为对话处理
        if (/^\{\{.*\}\}/.test(line)) {
          flushPending();
          resultHtml += `<p>${escapeHtmlText(line)}</p>`;
          continue;
        }

        let rawName = null;
        let content = null;
        let normalizedName = null;

        // 1. 尝试花括号格式: {角色名}「对话」
        const braceNamePattern = /^[\s]*\{([^}]+)\}[\s]*(.+)$/;
        const braceMatch = line.match(braceNamePattern);

        if (braceMatch) {
          rawName = braceMatch[1].trim();
          content = braceMatch[2].trim();
          normalizedName = normalizeDisplayName(rawName);

          // 检查是否是有头像的已知角色
          const config = CHARACTER_CONFIG[normalizedName];
          if (!config || !config.avatar) {
            // 不是已知角色，过滤掉花括号标记，内容作为普通文本显示
            flushPending();
            resultHtml += `<p>${escapeHtmlText(content)}</p>`;
            continue;
          }
        }
        // 只处理明确的 {角色名} 格式

        if (rawName && content && normalizedName) {
          // 是对话行
          if (checkCanMerge(normalizedName)) {
            pendingDialogue.texts.push(content);
          } else {
            flushPending();
            pendingDialogue = {
              name: rawName,
              normalizedName: normalizedName,
              texts: [content]
            };
          }
        } else {
          // 非对话行，或无法识别的格式
          flushPending();
          resultHtml += processLineWithImages(line);
        }
      }
      flushPending();
      return resultHtml;
    }

    function processLineWithImages(line) {
      const htmlLine = decodeHtmlEntities(line);
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = htmlLine;
      const decodedLine = tempDiv.textContent || tempDiv.innerText || htmlLine;

      // 跳过双花括号格式 {{...}}
      if (/^\{\{.*\}\}/.test(decodedLine.trim())) {
        return `<p>${escapeHtmlText(decodedLine)}</p>`;
      }

      // 主要格式: {角色名}「对话」
      const braceNamePattern = /^[\s]*\{([^}]+)\}[\s]*(.+)$/;
      const braceMatch = decodedLine.match(braceNamePattern);

      if (braceMatch) {
        const rawName = braceMatch[1].trim();
        const normalizedName = normalizeDisplayName(rawName);
        // 校验是否是有头像的已知角色
        const config = CHARACTER_CONFIG[normalizedName];
        if (config && config.avatar) {
          return createDialogueElement(rawName, braceMatch[2].trim());
        }
        // 不是已知角色，过滤掉花括号标记，内容作为普通文本显示
        return `<p>${highlightInlineDialogueQuotes(braceMatch[2].trim())}</p>`;
      }

      // 只处理明确的 {角色名} 格式

      // 图片处理 - 检测原始line中的<img>标签（decodedLine已被去除所有HTML标签，无法检测）
      const imgRegex = /<img[^>]*>/i;
      if (imgRegex.test(htmlLine)) {
        const div = document.createElement('div');
        div.innerHTML = htmlLine;
        return createInteractiveImageContainer(div.innerHTML);
      } else {
        return `<p>${highlightInlineDialogueQuotes(decodedLine)}</p>`;
      }
    }

    const IMAGE_GEN_RESPONSE_EVENT = 'generate-image-response';
    const IMAGE_GEN_AUTO_RERENDER = false;
    let imageGenRerenderTimer = null;

    function hasUnprocessedImageTag(html) {
      if (!html) return false;
      return /<\s*Image\b|<\s*pic\b/i.test(html) || /&lt;\s*(Image|pic)\b/i.test(html);
    }

    function scheduleImageGenRerender() {
      if (imageGenRerenderTimer) clearTimeout(imageGenRerenderTimer);
      imageGenRerenderTimer = setTimeout(() => {
        imageGenRerenderTimer = null;
        try {
          const contentDiv = document.getElementById('readingContent');
          if (!contentDiv) return;
          if (contentDiv.getAttribute('aria-busy') === 'true') return;
          const currentHtml = contentDiv.innerHTML || '';
          if (!hasUnprocessedImageTag(currentHtml)) return;
          processTextContent();
          if (typeof applyImageSize === 'function') applyImageSize();
        } catch (e) {
          console.warn('[正文美化] 生图响应重渲染失败:', e);
        }
      }, 30);
    }

    function initImageGenResponseListener() {
      if (window.__imageGenResponseBound) return;
      let eventOnFn;
      try {
        const win = window.parent || window;
        eventOnFn = win.eventOn || window.eventOn;
      } catch (e) {
        eventOnFn = window.eventOn;
      }
      if (typeof eventOnFn !== 'function') return;
      window.__imageGenResponseBound = true;
      eventOnFn(IMAGE_GEN_RESPONSE_EVENT, function (responseData) {
        if (!IMAGE_GEN_AUTO_RERENDER) return;
        if (responseData && responseData.success === false) return;
        scheduleImageGenRerender();
      });
    }

    function isImageUrlLike(text) {
      const trimmed = String(text || '').trim();
      if (!trimmed) return false;
      if (/^(SFW|NSFW)\//.test(trimmed)) return true;
      if (/^data:image\//i.test(trimmed)) return true;
      if (/^https?:\/\//i.test(trimmed)) return true;
      if (/^(?:\/|\.\/|\.\.\/)/.test(trimmed)) return true;
      if (/\.(webp|png|jpg|jpeg|gif|bmp|svg)(\?|#|$)/i.test(trimmed)) return true;
      return false;
    }

    function renderImageTag(match) {
      const content = match && typeof match.content === 'string' ? match.content : '';
      if (isImageUrlLike(content)) {
        return createImageElement(content);
      }
      return match && match.raw ? match.raw : '';
    }

    function createImageElement(imageUrl) {
      let trimmedUrl = imageUrl.trim();
      if (!trimmedUrl) return '';

      // 处理 <pic> 标签的相对路径格式，如 "SFW/希罗/通常1"
      // 补全为完整URL
      if (/^(SFW|NSFW)\//.test(trimmedUrl)) {
        // 如果没有.webp后缀，添加它
        if (!trimmedUrl.endsWith('.webp')) {
          trimmedUrl = trimmedUrl + '.webp';
        }
        trimmedUrl = 'https://gitgud.io/Rown/dnf/-/raw/master/' + trimmedUrl;
      }

      const imgTag = `<img src="${escapeHtmlAttr(trimmedUrl)}" alt="图片" loading="lazy">`;
      return createInteractiveImageContainer(imgTag);
    }

    // 辅助函数：为缺少编号的图片URL自动添加随机编号
    function autoAssignImageNumber(imgSrc) {
      try {
        const parts = imgSrc.split('/');
        const nsfwIndex = parts.findIndex(p => p === 'NSFW' || p === 'SFW');
        if (nsfwIndex === -1 || nsfwIndex + 2 >= parts.length) return imgSrc;

        const category = parts[nsfwIndex];
        const character = safeDecodeURIComponent(parts[nsfwIndex + 1]);
        const fileNameWithExt = safeDecodeURIComponent(parts[nsfwIndex + 2]);
        const fileName = fileNameWithExt.replace(/\.webp$/, '');

        // 检查是否已有编号
        const fileMatch = fileName.match(/^(.+?)(\d+)$/);
        if (fileMatch) return imgSrc; // 已有编号，不处理

        // 无编号，尝试从IMAGE_LISTS获取最大编号并随机分配
        const type = fileName;
        const categoryData = IMAGE_LISTS[category];
        if (!categoryData) return imgSrc;

        let characterData = categoryData[character];
        if (!characterData) {
          const normalizedChar = character.trim().normalize('NFC');
          characterData = categoryData[normalizedChar];
          if (!characterData) {
            const matched = Object.keys(categoryData).find(c =>
              c.trim().normalize('NFC') === normalizedChar || c.replace(/\s/g, '') === character.replace(/\s/g, '')
            );
            if (matched) characterData = categoryData[matched];
            else return imgSrc;
          }
        }

        let maxNumber = characterData[type];
        if (!maxNumber) {
          const normalizedType = type.trim().normalize('NFC');
          maxNumber = characterData[normalizedType];
          if (!maxNumber) {
            const matched = Object.keys(characterData).find(t =>
              t.trim().normalize('NFC') === normalizedType || t.replace(/\s/g, '') === type.replace(/\s/g, '')
            );
            if (matched) maxNumber = characterData[matched];
            else return imgSrc;
          }
        }

        // 随机生成编号
        const newNumber = Math.floor(Math.random() * maxNumber) + 1;
        parts[nsfwIndex + 2] = encodeURIComponent(type + newNumber + '.webp');
        return parts.join('/');
      } catch (e) {
        console.error('自动分配图片编号失败:', e);
        return imgSrc;
      }
    }

    // 辅助函数：生成交互式图片容器 HTML
    function createInteractiveImageContainer(imgContent, forceExpand) {
      const uniqueId = 'img-' + Math.random().toString(36).substr(2, 9);
      const autoExpand = !!forceExpand || localStorage.getItem('image-auto-expand') !== 'false'; // 默认展开
      const expandedClass = autoExpand ? ' expanded' : '';
      const buttonClass = autoExpand ? ' expanded' : '';
      const buttonText = autoExpand ? '收起插画' : '查看插画';

      // 提取img标签中的src，检查并自动分配编号
      const srcMatch = imgContent.match(/src=["']([^"']+)["']/i);
      if (srcMatch) {
        const originalSrc = srcMatch[1];
        const newSrc = autoAssignImageNumber(originalSrc);
        if (newSrc !== originalSrc) {
          imgContent = imgContent.replace(originalSrc, newSrc);
        }
        // 为NSFW/SFW图片添加onload事件，记录到CG收集缓存
        if (newSrc.includes('/NSFW/') || newSrc.includes('/SFW/')) {
          imgContent = imgContent.replace(/<img\s/i, '<img onload="recordCGUnlock(this.src)" ');
        }
      }

      return `<div class="image-container">
        <div style="display:flex;justify-content:center;align-items:center;gap:8px;">
          <button class="image-toggle-btn${buttonClass}" onclick="toggleImage('${uniqueId}')">
            <span class="image-toggle-text">${buttonText}</span>
          </button>
          <button class="image-refresh-btn" onclick="refreshImage('${uniqueId}', event)" title="随机切换图片">↻</button>
        </div>
        <div class="image-content${expandedClass}" id="${uniqueId}" style="text-align:center;">
          ${imgContent}
        </div>
      </div>`;
    }
    window.toggleImage = function (imageId) {
      const imageContent = document.getElementById(imageId);
      const button = imageContent.previousElementSibling.querySelector('.image-toggle-btn');
      const textSpan = button.querySelector('.image-toggle-text');
      if (imageContent.classList.contains('expanded')) {
        imageContent.classList.remove('expanded');
        button.classList.remove('expanded');
        textSpan.textContent = '查看插画';
      } else {
        imageContent.classList.add('expanded');
        button.classList.add('expanded');
        textSpan.textContent = '收起插画';
      }
    };

    let readingFontSize = 18;
    let imageSize = 70; // 默认70%

    document.addEventListener('DOMContentLoaded', () => {
      initThemeSwitcher(true);
      requestAnimationFrame(() => {
        // 初始化自定义角色：从MVU和缓存加载到CHARACTER_CONFIG
        loadCustomCharsIntoConfig();
        processTextContent();
        initImageGenResponseListener();
        initSettings();
        initAvatarUpload();
        renderCustomCharList();
        const savedReadingFontSize = localStorage.getItem('readingFontSize');
        readingFontSize = savedReadingFontSize ? parseInt(savedReadingFontSize) : 18;
        const readingContent = document.querySelector('.reading-content');
        if (readingContent) readingContent.style.fontSize = readingFontSize + 'px';
        const savedImageSize = localStorage.getItem('imageSize');
        imageSize = savedImageSize !== null ? parseInt(savedImageSize) : 70; // 默认70%
        applyImageSize();
        initMerchantTradeUi();
        initAnimationObserver();
        requestAnimationFrame(() => {
          document.body.classList.remove('render-pending', 'theme-preload');
          document.body.classList.add('render-ready');
        });
      });
    });

    /* Merged into window.setTheme / applyTheme logic above to remove duplication */

    function initSettings() {
      const settingsBtn = document.getElementById('settingsBtn');
      const settingsPanel = document.getElementById('settingsPanel');
      const imageToggle = document.getElementById('imageToggle');
      const dialogueFontToggle = document.getElementById('dialogueFontToggle');
      if (!settingsBtn || !settingsPanel || !imageToggle) return;
      if (localStorage.getItem('image-auto-expand') !== 'false') imageToggle.classList.add('active'); // 默认展开

      // 统一对白字体大小：PC端默认开启，移动端默认关闭
      const isMobile = window.innerWidth <= 768;
      const savedDialogueFont = localStorage.getItem('unified-dialogue-font');
      let dialogueFontEnabled;
      if (savedDialogueFont !== null) {
        dialogueFontEnabled = savedDialogueFont === 'true';
      } else {
        dialogueFontEnabled = !isMobile; // PC默认开，移动端默认关
      }
      if (dialogueFontEnabled) {
        dialogueFontToggle.classList.add('active');
        document.body.classList.add('unified-dialogue-font');
      }

      settingsBtn.addEventListener('click', function (e) { e.stopPropagation(); settingsPanel.classList.toggle('active'); });
      imageToggle.addEventListener('click', function () {
        this.classList.toggle('active');
        const isActive = this.classList.contains('active');
        localStorage.setItem('image-auto-expand', isActive);
        document.querySelectorAll('.image-content').forEach((imageContent) => {
          const button = imageContent.previousElementSibling?.querySelector('.image-toggle-btn');
          const textSpan = button?.querySelector('.image-toggle-text');
          imageContent.classList.toggle('expanded', isActive);
          button?.classList.toggle('expanded', isActive);
          if (textSpan) {
            textSpan.textContent = isActive ? '收起插画' : '查看插画';
          }
        });
        showSettingsMessage(isActive ? '已开启默认展开插画' : '已关闭默认展开插画');
      });

      dialogueFontToggle.addEventListener('click', function () {
        this.classList.toggle('active');
        const isActive = this.classList.contains('active');
        localStorage.setItem('unified-dialogue-font', isActive);
        document.body.classList.toggle('unified-dialogue-font', isActive);
        showSettingsMessage(isActive ? '已统一对白与正文字体大小' : '已恢复对白独立字体大小');
      });

      document.addEventListener('click', function (e) {
        if (!settingsPanel.contains(e.target) && !settingsBtn.contains(e.target)) settingsPanel.classList.remove('active');
      });
    }

    function showSettingsMessage(message) {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'toast-message';
      messageDiv.textContent = message;
      document.body.appendChild(messageDiv);
      setTimeout(() => messageDiv.remove(), 2000);
    }

    // Theme setter helper
    const VALID_THEMES = new Set(['warm-white', 'dark', 'green', 'classic-dark']);

    const updateThemeButtons = (theme) => {
      localStorage.setItem('kivotos-theme', theme);
      localStorage.setItem('theme', theme); // compatible backup
      document.documentElement.style.colorScheme = (theme === 'dark' || theme === 'classic-dark') ? 'dark' : 'light';
      document.querySelectorAll('.control-btn[data-theme-key]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.themeKey === theme);
      });
    };

    const commitTheme = (theme) => {
      document.body.setAttribute('data-theme', theme);
      updateThemeButtons(theme);
    };

    const applyTheme = (theme, skipAnimation = false) => {
      const normalizedTheme = VALID_THEMES.has(theme) ? theme : 'warm-white';

      if (!skipAnimation && document.startViewTransition) {
        document.startViewTransition(() => commitTheme(normalizedTheme));
        return;
      }

      commitTheme(normalizedTheme);
    };

    // Expose for HTML onclick
    window.setTheme = applyTheme;

    function initThemeSwitcher(skipAnimation = false) {
      const savedTheme = window.__initialTheme || localStorage.getItem('kivotos-theme') || localStorage.getItem('theme') || 'warm-white';
      applyTheme(savedTheme, skipAnimation);
    }

    function adjustReadingFontSize(delta) {
      readingFontSize = Math.max(12, Math.min(28, readingFontSize + delta));
      const readingContent = document.querySelector('.reading-content');
      if (readingContent) readingContent.style.fontSize = readingFontSize + 'px';
      localStorage.setItem('readingFontSize', readingFontSize);
    }

    function adjustImageSize(delta) {
      imageSize = Math.max(30, Math.min(200, imageSize + delta));
      applyImageSize();
      localStorage.setItem('imageSize', imageSize);
      showSettingsMessage(`插画大小: ${imageSize}%`);
    }

    function applyImageSize() {
      document.querySelectorAll('.image-content img').forEach(img => {
        img.style.width = imageSize + '%';
        img.style.maxWidth = imageSize + '%';
        img.style.height = 'auto';
      });
    }

    // --- Animation Observer: pause infinite animations when off-screen ---
    function initAnimationObserver() {
      const animSelectors = '.shimmer-text, .action-shimmer, .skill-name-wave, .enemy-hp-fill, .summon-hp-fill, .dice-roll-tag.crit, .badge-glow-success, .badge-glow-danger, .item-shimmer-artifact, .item-shimmer-legendary, .item-shimmer-epic, .item-shimmer-mythic, .sparkle, .name-initial-\u7279\u56FE';
      const style = document.createElement('style');
      style.textContent = '.anim-paused { animation-play-state: paused !important; }';
      document.head.appendChild(style);
      if (!('IntersectionObserver' in window)) return;
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          entry.target.classList.toggle('anim-paused', !entry.isIntersecting);
        });
      }, { rootMargin: '200px 0px' });
      // Observe existing + future animated elements via MutationObserver
      const observeAnimated = () => {
        document.querySelectorAll(animSelectors).forEach(el => {
          if (!el.dataset.animObserved) { el.dataset.animObserved = '1'; observer.observe(el); }
        });
      };
      observeAnimated();
      const mo = new MutationObserver(observeAnimated);
      mo.observe(document.getElementById('readingContent') || document.body, { childList: true, subtree: true });
    }
  </script>
